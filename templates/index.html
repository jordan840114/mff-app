<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7ec8e3" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MFF" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <title>MY FAVORITE FLIGHT</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky: #7ec8e3;
      --sky-dark: #5bb3d0;
      --white: #ffffff;
      --black: #0a0a0a;
      --gray: #6b7280;
      --light: #f0f8fc;
      --accent: #0a0a0a;
      --green: #22c55e;
      --red: #ef4444;
    }

    html { font-family: 'Space Grotesk', -apple-system, sans-serif; }

    body {
      background: var(--sky);
      min-height: 100vh;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 0;
      max-width: 640px;
      margin: 0 auto;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--black);
      color: var(--white);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 6px 12px;
      border-radius: 100px;
      text-transform: uppercase;
    }

    .logo-dot {
      width: 6px;
      height: 6px;
      background: var(--sky);
      border-radius: 50%;
    }

    #notify-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--white);
      border: 2px solid var(--black);
      border-radius: 100px;
      color: var(--black);
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }

    #notify-btn:hover { background: var(--black); color: var(--white); }
    #notify-btn.active { background: var(--black); color: var(--sky); }

    .notify-dot {
      width: 6px;
      height: 6px;
      background: currentColor;
      border-radius: 50%;
    }

    /* Hero */
    .hero {
      padding: 32px 20px 8px;
      max-width: 640px;
      margin: 0 auto;
    }

    .hero-title {
      font-size: clamp(36px, 9vw, 56px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      text-transform: uppercase;
      color: var(--black);
    }

    .hero-title span { color: var(--white); }

    .hero-sub {
      font-size: 13px;
      font-weight: 500;
      color: var(--black);
      opacity: 0.55;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 8px;
    }

    /* Main content */
    main { padding: 20px; max-width: 640px; margin: 0 auto; }

    /* Add flight form */
    .add-card {
      background: var(--white);
      border: 2px solid var(--black);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 14px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .input-group { display: flex; flex-direction: column; gap: 5px; }

    label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray);
    }

    input, select {
      background: var(--light);
      border: 2px solid transparent;
      border-radius: 10px;
      color: var(--black);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      padding: 10px 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }

    input::placeholder { color: #b0bec5; font-weight: 500; }
    input:focus, select:focus { border-color: var(--black); background: var(--white); }
    input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.4; }
    select option { background: var(--white); }

    .btn-add {
      width: 100%;
      background: var(--black);
      border: 2px solid var(--black);
      border-radius: 12px;
      color: var(--white);
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 14px;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.15s;
    }

    .btn-add:hover { opacity: 0.8; }
    .btn-add:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Section divider */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--black);
      opacity: 0.5;
      margin-bottom: 12px;
      margin-top: 4px;
    }

    /* Flight cards */
    .flights-list { display: flex; flex-direction: column; gap: 10px; }

    .flight-card {
      background: var(--white);
      border: 2px solid var(--black);
      border-radius: 20px;
      padding: 18px 20px;
      position: relative;
      transition: transform 0.1s;
    }

    .flight-card:active { transform: scale(0.98); }

    .flight-card.alert {
      background: var(--black);
      color: var(--white);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .route {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .iata {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .route-arrow {
      font-size: 16px;
      opacity: 0.4;
    }

    .flight-card.alert .route-arrow { opacity: 0.6; color: var(--sky); }

    .badge-low {
      display: inline-flex;
      align-items: center;
      background: var(--sky);
      color: var(--black);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 100px;
      margin-left: 8px;
    }

    .btn-delete {
      background: transparent;
      border: 2px solid currentColor;
      border-radius: 100px;
      color: var(--gray);
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .btn-delete:hover { border-color: var(--red); color: var(--red); }
    .flight-card.alert .btn-delete { color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.3); }
    .flight-card.alert .btn-delete:hover { border-color: var(--red); color: var(--red); }

    .card-dates {
      font-size: 12px;
      font-weight: 500;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 16px;
    }

    .flight-card.alert .card-dates { color: rgba(255,255,255,0.5); }

    .card-prices {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1.5px solid var(--light);
    }

    .flight-card.alert .card-prices { border-color: rgba(255,255,255,0.12); }

    .price-group { display: flex; flex-direction: column; gap: 3px; }

    .price-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gray);
    }

    .flight-card.alert .price-tag { color: rgba(255,255,255,0.45); }

    .price-num {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--black);
    }

    .price-num.low { color: var(--sky-dark); }
    .flight-card.alert .price-num { color: var(--sky); }
    .price-num.pending { font-size: 16px; opacity: 0.35; }

    .target-num {
      font-size: 15px;
      font-weight: 700;
      color: var(--gray);
      text-align: right;
    }

    .flight-card.alert .target-num { color: rgba(255,255,255,0.5); }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
    }

    .last-checked {
      font-size: 10px;
      font-weight: 500;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .flight-card.alert .last-checked { color: rgba(255,255,255,0.35); }

    .btn-check {
      background: var(--light);
      border: 2px solid transparent;
      border-radius: 100px;
      color: var(--black);
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-check:hover { border-color: var(--black); }
    .btn-check:disabled { opacity: 0.3; cursor: not-allowed; }
    .flight-card.alert .btn-check { background: rgba(255,255,255,0.12); color: var(--white); }

    /* Empty */
    .empty {
      text-align: center;
      padding: 56px 0 32px;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      display: block;
      filter: grayscale(0.3);
    }

    .empty-text {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--black);
      opacity: 0.4;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--black);
      border-radius: 100px;
      color: var(--white);
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 12px 20px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 100;
      white-space: nowrap;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span>MFF</span>
    <div class="logo-dot"></div>
  </div>
  <button id="notify-btn" onclick="toggleNotifications()">
    <div class="notify-dot"></div>
    通知
  </button>
</header>

<div class="hero">
  <h1 class="hero-title">MY<br><span>FAVORITE</span><br>FLIGHT</h1>
  <p class="hero-sub">Track · Alert · Fly</p>
</div>

<main>
  <div class="add-card">
    <p class="card-label">追蹤新航班</p>
    <div class="form-row">
      <div class="input-group">
        <label>出發地</label>
        <input id="origin" type="text" placeholder="TPE" maxlength="3" />
      </div>
      <div class="input-group">
        <label>目的地</label>
        <input id="destination" type="text" placeholder="NRT" maxlength="3" />
      </div>
    </div>
    <div class="form-row">
      <div class="input-group">
        <label>去程</label>
        <input id="departure_date" type="date" />
      </div>
      <div class="input-group">
        <label>回程（選填）</label>
        <input id="return_date" type="date" />
      </div>
    </div>
    <div class="form-row">
      <div class="input-group">
        <label>目標價格</label>
        <input id="target_price" type="number" placeholder="5000" />
      </div>
      <div class="input-group">
        <label>幣別</label>
        <select id="currency">
          <option value="TWD">TWD</option>
          <option value="USD">USD</option>
          <option value="JPY">JPY</option>
          <option value="HKD">HKD</option>
          <option value="KRW">KRW</option>
        </select>
      </div>
    </div>
    <button class="btn-add" id="add-btn" onclick="addFlight()">Track This Flight</button>
  </div>

  <p class="section-label">追蹤中</p>

  <div class="flights-list" id="flights-list">
    <div class="empty">
      <span class="empty-icon">✈️</span>
      <p class="empty-text">尚無追蹤航班</p>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  const VAPID_PUBLIC_KEY = "{{ vapid_public_key }}";
  let swRegistration = null;

  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/static/sw.js").then(reg => {
      swRegistration = reg;
      checkNotificationStatus();
    });
  }

  function urlBase64ToUint8Array(b) {
    const pad = "=".repeat((4 - b.length % 4) % 4);
    const base64 = (b + pad).replace(/-/g, "+").replace(/_/g, "/");
    const raw = atob(base64);
    return new Uint8Array([...raw].map(c => c.charCodeAt(0)));
  }

  async function checkNotificationStatus() {
    if (!("PushManager" in window)) return;
    const btn = document.getElementById("notify-btn");
    if (Notification.permission === "granted") {
      btn.textContent = "";
      const dot = document.createElement("div");
      dot.className = "notify-dot";
      btn.appendChild(dot);
      btn.appendChild(document.createTextNode(" 已開啟"));
      btn.classList.add("active");
    }
  }

  async function toggleNotifications() {
    if (!swRegistration) return showToast("不支援推播通知");
    if (Notification.permission === "denied") return showToast("請到設定允許通知");

    const btn = document.getElementById("notify-btn");
    if (Notification.permission === "granted") {
      const sub = await swRegistration.pushManager.getSubscription();
      if (sub) {
        await fetch("/api/unsubscribe", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(sub.toJSON()) });
        await sub.unsubscribe();
        btn.innerHTML = '<div class="notify-dot"></div> 通知';
        btn.classList.remove("active");
        showToast("已關閉通知");
        return;
      }
    }

    const permission = await Notification.requestPermission();
    if (permission !== "granted") return showToast("通知權限被拒絕");

    try {
      const sub = await swRegistration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });
      await fetch("/api/subscribe", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(sub.toJSON()) });
      btn.innerHTML = '<div class="notify-dot"></div> 已開啟';
      btn.classList.add("active");
      showToast("低價通知已開啟！");
    } catch (e) {
      showToast("開啟失敗：" + e.message);
    }
  }

  async function loadFlights() {
    const res = await fetch("/api/flights");
    const flights = await res.json();
    renderFlights(flights);
  }

  function renderFlights(flights) {
    const el = document.getElementById("flights-list");
    if (!flights.length) {
      el.innerHTML = '<div class="empty"><span class="empty-icon">✈️</span><p class="empty-text">尚無追蹤航班</p></div>';
      return;
    }
    el.innerHTML = flights.map(f => {
      const isLow = f.current_price && f.current_price <= f.target_price;
      const priceHtml = f.current_price
        ? `<span class="price-num ${isLow ? "low" : ""}">${f.current_price.toLocaleString()}</span>`
        : `<span class="price-num pending">— —</span>`;
      const dates = f.return_date ? `${f.departure_date} — ${f.return_date}` : f.departure_date;
      const checked = f.last_checked
        ? new Date(f.last_checked + "Z").toLocaleString("zh-TW", { timeZone: "Asia/Taipei", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" })
        : "未查價";
      return `
        <div class="flight-card ${isLow ? "alert" : ""}">
          <div class="card-top">
            <div class="route">
              <span class="iata">${f.origin}</span>
              <span class="route-arrow">→</span>
              <span class="iata">${f.destination}</span>
              ${isLow ? '<span class="badge-low">低價</span>' : ""}
            </div>
            <button class="btn-delete" onclick="deleteFlight(${f.id})">移除</button>
          </div>
          <div class="card-dates">${dates}</div>
          <div class="card-prices">
            <div class="price-group">
              <span class="price-tag">目前最低 (${f.currency})</span>
              ${priceHtml}
            </div>
            <div class="price-group" style="text-align:right">
              <span class="price-tag">目標</span>
              <span class="target-num">≤ ${f.target_price.toLocaleString()}</span>
            </div>
          </div>
          <div class="card-footer">
            <span class="last-checked">查價 ${checked}</span>
            <button class="btn-check" id="check-btn-${f.id}" onclick="checkNow(${f.id})">立即查價</button>
          </div>
        </div>`;
    }).join("");
  }

  async function addFlight() {
    const btn = document.getElementById("add-btn");
    const origin = document.getElementById("origin").value.trim().toUpperCase();
    const destination = document.getElementById("destination").value.trim().toUpperCase();
    const departure_date = document.getElementById("departure_date").value;
    const return_date = document.getElementById("return_date").value;
    const target_price = document.getElementById("target_price").value;
    const currency = document.getElementById("currency").value;
    if (!origin || !destination || !departure_date || !target_price) return showToast("請填寫必要欄位");
    btn.disabled = true; btn.textContent = "新增中...";
    try {
      const res = await fetch("/api/flights", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ origin, destination, departure_date, return_date, target_price, currency })
      });
      if (!res.ok) throw new Error();
      ["origin","destination","departure_date","return_date","target_price"].forEach(id => document.getElementById(id).value = "");
      showToast("已新增，查詢價格中...");
      await loadFlights();
    } catch { showToast("新增失敗"); }
    finally { btn.disabled = false; btn.textContent = "Track This Flight"; }
  }

  async function deleteFlight(id) {
    await fetch(`/api/flights/${id}`, { method: "DELETE" });
    showToast("已移除");
    loadFlights();
  }

  async function checkNow(id) {
    const btn = document.getElementById(`check-btn-${id}`);
    btn.disabled = true; btn.textContent = "查詢中...";
    try {
      const res = await fetch(`/api/flights/${id}/check`, { method: "POST" });
      if (!res.ok) throw new Error();
      showToast("價格已更新！");
      await loadFlights();
    } catch { showToast("查詢失敗"); btn.disabled = false; btn.textContent = "立即查價"; }
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3000);
  }

  loadFlights();
</script>
</body>
</html>
