<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7bc8e2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MFF" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <title>MFF</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky: #7bc8e2;
      --white: #ffffff;
      --black: #0d0d0d;
      --dim: rgba(13,13,13,0.38);
      --line: rgba(13,13,13,0.1);
      --alert: #EF4444;
    }

    html, body {
      background: var(--sky);
      color: var(--black);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV PILL ── */
    .nav-wrap {
      padding: 14px 14px 0;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    nav {
      background: var(--white);
      border-radius: 100px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
    }

    .nav-logo {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--black);
    }

    .notif-btn {
      background: none;
      border: none;
      color: var(--dim);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }

    .notif-btn.active { color: var(--black); }

    /* ── PAGE CONTENT ── */
    main {
      padding: 28px 14px;
    }

    /* ── ADD ROW ── */
    .add-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .page-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .add-btn {
      background: var(--white);
      border: none;
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--black);
      padding: 8px 14px;
      cursor: pointer;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .add-btn:active { opacity: 0.7; }

    /* ── EMPTY STATE ── */
    .empty-state {
      padding: 60px 0;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      line-height: 2.4;
    }

    /* ── FLIGHT ITEM ── */
    .flight-item {
      background: var(--white);
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 10px;
      transition: opacity 0.2s;
    }

    .flight-item.alerted {
      background: var(--alert);
      color: var(--white);
    }

    .flight-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .flight-route {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1;
    }

    .flight-route .arrow {
      font-size: 14px;
      font-weight: 400;
      opacity: 0.4;
      margin: 0 4px;
    }

    .flight-price {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-align: right;
    }

    .flight-mid {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .flight-date {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .alert-badge {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.2);
      padding: 3px 7px;
      border-radius: 100px;
    }

    .flight-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid rgba(13,13,13,0.08);
    }

    .flight-item.alerted .flight-bottom {
      border-top-color: rgba(255,255,255,0.2);
    }

    .flight-target {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .flight-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-sm {
      background: none;
      border: 1px solid rgba(13,13,13,0.15);
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .flight-item.alerted .btn-sm {
      border-color: rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.7);
    }

    .btn-sm:active { opacity: 0.6; }

    .checked-time {
      font-size: 9px;
      letter-spacing: 0.06em;
      opacity: 0.4;
    }

    /* ── BOTTOM SHEET ── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .sheet-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--white);
      border-radius: 20px 20px 0 0;
      z-index: 101;
      padding: 0 18px calc(env(safe-area-inset-bottom, 16px) + 20px);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 92vh;
      overflow-y: auto;
    }

    .sheet.open {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 3px;
      background: rgba(0,0,0,0.1);
      border-radius: 2px;
      margin: 12px auto 0;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0 16px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 22px;
    }

    .sheet-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .sheet-close {
      background: rgba(0,0,0,0.06);
      border: none;
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
      padding: 5px 12px;
      cursor: pointer;
    }

    .field { margin-bottom: 18px; }

    .field-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 7px;
      display: block;
    }

    .field input, .field select {
      width: 100%;
      background: rgba(0,0,0,0.04);
      border: none;
      border-radius: 8px;
      color: var(--black);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 11px 12px;
      outline: none;
      -webkit-appearance: none;
      transition: background 0.2s;
    }

    .field input::placeholder { color: var(--dim); }
    .field input:focus, .field select:focus { background: rgba(0,0,0,0.08); }
    .field select option { background: #fff; text-transform: uppercase; }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .submit-btn {
      width: 100%;
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 16px;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s;
    }

    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .submit-btn:active { opacity: 0.8; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--black);
      color: var(--white);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 9px 16px;
      border-radius: 100px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s;
      z-index: 200;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .spin {
      display: inline-block;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="nav-wrap">
  <nav>
    <div class="nav-logo">MFF ●</div>
    <button class="notif-btn" id="notif-btn">Notify</button>
  </nav>
</div>

<main>
  <div class="add-row">
    <span class="page-label">Price Tracker</span>
    <button class="add-btn" id="open-sheet-btn">+ Track Flight</button>
  </div>

  <div id="flight-list">
    <div class="empty-state">No flights tracked.<br>Add one above.</div>
  </div>
</main>

<!-- Bottom Sheet -->
<div class="sheet-overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">Track Flight</span>
    <button class="sheet-close" id="close-sheet-btn">Close</button>
  </div>

  <div class="field-row">
    <div class="field">
      <label class="field-label">From</label>
      <input type="text" id="origin" placeholder="TPE" maxlength="3" />
    </div>
    <div class="field">
      <label class="field-label">To</label>
      <input type="text" id="destination" placeholder="NRT" maxlength="3" />
    </div>
  </div>

  <div class="field-row">
    <div class="field">
      <label class="field-label">Depart</label>
      <input type="date" id="departure_date" />
    </div>
    <div class="field">
      <label class="field-label">Return</label>
      <input type="date" id="return_date" />
    </div>
  </div>

  <div class="field-row">
    <div class="field">
      <label class="field-label">Target Price</label>
      <input type="number" id="target_price" placeholder="8000" />
    </div>
    <div class="field">
      <label class="field-label">Currency</label>
      <select id="currency">
        <option value="TWD">TWD</option>
        <option value="USD">USD</option>
        <option value="JPY">JPY</option>
        <option value="EUR">EUR</option>
        <option value="KRW">KRW</option>
      </select>
    </div>
  </div>

  <button class="submit-btn" id="submit-btn">Add Flight</button>
</div>

<div class="toast" id="toast"></div>

<script>
  const VAPID_PUBLIC_KEY = "{{ vapid_public_key }}";

  const overlay = document.getElementById('overlay');
  const sheet = document.getElementById('sheet');

  function openSheet() {
    sheet.classList.add('open');
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeSheet() {
    sheet.classList.remove('open');
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('open-sheet-btn').addEventListener('click', openSheet);
  document.getElementById('close-sheet-btn').addEventListener('click', closeSheet);
  overlay.addEventListener('click', closeSheet);

  function showToast(msg, duration = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  function fmtPrice(price, currency) {
    if (price == null) return '—';
    return price.toLocaleString() + ' ' + currency;
  }

  function timeSince(str) {
    if (!str) return 'Not checked';
    const diff = Date.now() - new Date(str + 'Z').getTime();
    const h = Math.floor(diff / 3600000);
    if (h < 1) return 'Just now';
    if (h < 24) return h + 'h ago';
    return Math.floor(h / 24) + 'd ago';
  }

  function renderFlights(flights) {
    const list = document.getElementById('flight-list');
    if (!flights.length) {
      list.innerHTML = '<div class="empty-state">No flights tracked.<br>Add one above.</div>';
      return;
    }

    list.innerHTML = flights.map(f => {
      const alerted = f.current_price && f.current_price <= f.target_price;
      const cls = alerted ? 'flight-item alerted' : 'flight-item';
      const currentDisplay = f.current_price ? fmtPrice(f.current_price, f.currency) : '—';
      const tripLabel = f.return_date ? 'RT' : 'OW';
      return `
        <div class="${cls}" data-id="${f.id}">
          <div class="flight-top">
            <div class="flight-route">
              ${f.origin}<span class="arrow"> → </span>${f.destination}
            </div>
            <div class="flight-price">${currentDisplay}</div>
          </div>
          <div class="flight-mid">
            <div class="flight-date">${f.departure_date}${f.return_date ? ' · ' + f.return_date : ''} · ${tripLabel}</div>
            ${alerted ? '<span class="alert-badge">↓ Below Target</span>' : ''}
          </div>
          <div class="flight-bottom">
            <div class="flight-target">Target: ${fmtPrice(f.target_price, f.currency)}</div>
            <div class="flight-actions">
              <span class="checked-time">${timeSince(f.last_checked)}</span>
              <button class="btn-sm" onclick="checkFlight(${f.id})">Check</button>
              <button class="btn-sm" onclick="deleteFlight(${f.id})">Del</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  async function loadFlights() {
    try {
      const r = await fetch('/api/flights');
      renderFlights(await r.json());
    } catch (e) { showToast('Load failed'); }
  }

  async function checkFlight(id) {
    try {
      const r = await fetch(`/api/flights/${id}/check`, { method: 'POST' });
      if (!r.ok) throw new Error();
      showToast('Updated');
    } catch (e) { showToast('Check failed'); }
    await loadFlights();
  }

  async function deleteFlight(id) {
    try {
      await fetch(`/api/flights/${id}`, { method: 'DELETE' });
      await loadFlights();
    } catch (e) { showToast('Delete failed'); }
  }

  document.getElementById('submit-btn').addEventListener('click', async () => {
    const origin = document.getElementById('origin').value.trim().toUpperCase();
    const destination = document.getElementById('destination').value.trim().toUpperCase();
    const departure_date = document.getElementById('departure_date').value;
    const return_date = document.getElementById('return_date').value;
    const target_price = document.getElementById('target_price').value;
    const currency = document.getElementById('currency').value;

    if (!origin || !destination || !departure_date || !target_price) {
      showToast('Fill all required fields');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Adding...';

    try {
      const r = await fetch('/api/flights', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ origin, destination, departure_date, return_date, target_price: parseInt(target_price), currency })
      });
      if (!r.ok) throw new Error();
      closeSheet();
      showToast('Flight added');
      ['origin','destination','departure_date','return_date','target_price'].forEach(id => document.getElementById(id).value = '');
      await loadFlights();
    } catch (e) { showToast('Failed to add'); }
    finally {
      btn.disabled = false;
      btn.textContent = 'Add Flight';
    }
  });

  const notifBtn = document.getElementById('notif-btn');
  let pushSub = null;

  async function initPush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    try {
      const reg = await navigator.serviceWorker.register('/static/sw.js');
      pushSub = await reg.pushManager.getSubscription();
      notifBtn.classList.toggle('active', !!pushSub);
    } catch (e) {}
  }

  notifBtn.addEventListener('click', async () => {
    if (!('serviceWorker' in navigator)) { showToast('Not supported'); return; }
    try {
      const reg = await navigator.serviceWorker.ready;
      if (pushSub) {
        await fetch('/api/unsubscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ endpoint: pushSub.endpoint }) });
        await pushSub.unsubscribe();
        pushSub = null;
        notifBtn.classList.remove('active');
        showToast('Notifications off');
      } else {
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') { showToast('Permission denied'); return; }
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
        await fetch('/api/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(sub) });
        pushSub = sub;
        notifBtn.classList.add('active');
        showToast('Notifications on');
      }
    } catch (e) { showToast('Error'); }
  });

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
  }

  initPush();
  loadFlights();
</script>
</body>
</html>
