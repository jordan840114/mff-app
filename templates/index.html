<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d5a84" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MFF" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <title>MYFAVFLIGHT</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --fg: #0d0d0d;
      --dim: rgba(13,13,13,0.42);
      --line: rgba(13,13,13,0.1);
    }

    html, body {
      min-height: 100vh;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── ANIMATED GRADIENT BACKGROUND ── */
    #grad-bg {
      position: fixed;
      inset: -8%;
      z-index: 0;
      background: #060810;
      transition: background 1.4s ease;
      filter: url(#lava-filter);
    }

    .blob {
      position: absolute;
      will-change: transform;
      transition: background 1.4s ease;
    }

    /* 近黑底層 */
    #b1 { width: 58vw; height: 58vw; filter: blur(88px); opacity: 0.90;
          top: 5%;  left: 8%;  background: #070c16;
          border-radius: 64% 36% 52% 48% / 58% 44% 56% 42%;
          animation: da 52s ease-in-out infinite; }
    #b2 { width: 50vw; height: 50vw; filter: blur(78px); opacity: 0.86;
          top: 52%; right: 5%; background: #04080e;
          border-radius: 42% 58% 66% 34% / 52% 68% 32% 48%;
          animation: db 44s ease-in-out infinite; }
    /* 深青藍主體 */
    #b3 { width: 54vw; height: 54vw; filter: blur(70px); opacity: 0.88;
          top: 28%; left: 18%; background: #0e5060;
          border-radius: 72% 28% 44% 56% / 36% 62% 38% 64%;
          animation: dc 36s ease-in-out infinite; }
    #b4 { width: 48vw; height: 48vw; filter: blur(64px); opacity: 0.84;
          top: 55%; left: 5%;  background: #1a6878;
          border-radius: 38% 62% 58% 42% / 66% 34% 62% 38%;
          animation: dd 30s ease-in-out infinite; }
    #b8 { width: 46vw; height: 46vw; filter: blur(62px); opacity: 0.82;
          top: 10%; left: 45%; background: #124858;
          border-radius: 56% 44% 36% 64% / 44% 56% 48% 52%;
          animation: dh 46s ease-in-out infinite; }
    /* 薰衣草紫粉 */
    #b5 { width: 40vw; height: 40vw; filter: blur(56px); opacity: 0.76;
          top: 5%;  right: 12%; background: #9878b8;
          border-radius: 48% 52% 68% 32% / 60% 40% 56% 44%;
          animation: de 26s ease-in-out infinite; }
    #b6 { width: 36vw; height: 36vw; filter: blur(50px); opacity: 0.72;
          top: 65%; right: 18%; background: #c0a0d0;
          border-radius: 66% 34% 42% 58% / 38% 62% 44% 56%;
          animation: df 38s ease-in-out infinite; }
    /* 近白亮點 — 低飽和 lavender-white */
    #b7 { width: 36vw; height: 36vw; filter: blur(48px); opacity: 0.50;
          top: 32%; left: 52%; background: #ccc0d8;
          border-radius: 54% 46% 62% 38% / 48% 66% 34% 52%;
          animation: dg 32s ease-in-out infinite; }
    #b9 { width: 30vw; height: 30vw; filter: blur(42px); opacity: 0.44;
          top: 70%; left: 35%; background: #baaec8;
          border-radius: 40% 60% 54% 46% / 62% 38% 58% 42%;
          animation: di 29s ease-in-out infinite; }

    @keyframes da {
      0%   { transform: translate(0,0) scale(1); }
      14%  { transform: translate(18vw, 22vh) scale(1.08); }
      30%  { transform: translate(8vw,  42vh) scale(0.94); }
      47%  { transform: translate(-16vw, 30vh) scale(1.1); }
      63%  { transform: translate(-22vw,-10vh) scale(0.92); }
      78%  { transform: translate(5vw, -25vh)  scale(1.05); }
      92%  { transform: translate(14vw, 8vh)   scale(0.97); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes db {
      0%   { transform: translate(0,0) scale(1); }
      12%  { transform: translate(-20vw,-18vh) scale(1.06); }
      28%  { transform: translate(-8vw, -35vh) scale(0.93); }
      45%  { transform: translate(16vw, -28vh) scale(1.1); }
      62%  { transform: translate(24vw,  12vh) scale(0.9); }
      78%  { transform: translate(-4vw,  20vh) scale(1.04); }
      91%  { transform: translate(-14vw, 5vh)  scale(0.96); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes dc {
      0%   { transform: translate(0,0) scale(1); }
      11%  { transform: translate(22vw,-14vh) scale(1.12); }
      24%  { transform: translate(14vw, 24vh) scale(0.88); }
      40%  { transform: translate(-18vw, 18vh) scale(1.14); }
      56%  { transform: translate(-24vw,-20vh) scale(0.9); }
      70%  { transform: translate(8vw,  -30vh) scale(1.08); }
      86%  { transform: translate(20vw,  6vh)  scale(0.94); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes dd {
      0%   { transform: translate(0,0) scale(1); }
      13%  { transform: translate(28vw, 10vh) scale(1.1); }
      27%  { transform: translate(20vw,-22vh) scale(0.9); }
      43%  { transform: translate(-10vw,-32vh) scale(1.15); }
      59%  { transform: translate(-28vw,-8vh)  scale(0.86); }
      74%  { transform: translate(-12vw, 26vh) scale(1.06); }
      89%  { transform: translate(10vw,  18vh) scale(0.95); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes de {
      0%   { transform: translate(0,0) scale(1); }
      15%  { transform: translate(-16vw, 28vh) scale(1.12); }
      32%  { transform: translate(-26vw,-12vh) scale(0.88); }
      48%  { transform: translate(-4vw, -36vh) scale(1.16); }
      65%  { transform: translate(20vw, -18vh) scale(0.86); }
      80%  { transform: translate(28vw,  16vh) scale(1.08); }
      93%  { transform: translate(6vw,   30vh) scale(0.94); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes df {
      0%   { transform: translate(0,0) scale(1); }
      16%  { transform: translate(-22vw,-24vh) scale(1.1); }
      33%  { transform: translate(-8vw, -40vh) scale(0.9); }
      50%  { transform: translate(18vw, -28vh) scale(1.13); }
      66%  { transform: translate(26vw,  10vh) scale(0.88); }
      82%  { transform: translate(4vw,   32vh) scale(1.06); }
      94%  { transform: translate(-12vw, 16vh) scale(0.96); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes dg {
      0%   { transform: translate(0,0) scale(1); }
      20%  { transform: translate(-30vw,-16vh) scale(1.14); }
      40%  { transform: translate(-14vw, 28vh) scale(0.86); }
      60%  { transform: translate(24vw,  32vh) scale(1.12); }
      80%  { transform: translate(30vw, -20vh) scale(0.88); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes dh {
      0%   { transform: translate(0,0) scale(1); }
      17%  { transform: translate(-24vw, 14vh) scale(1.08); }
      36%  { transform: translate(-16vw,-26vh) scale(0.92); }
      54%  { transform: translate(14vw, -32vh) scale(1.1); }
      71%  { transform: translate(28vw,  8vh)  scale(0.9); }
      87%  { transform: translate(10vw,  28vh) scale(1.05); }
      100% { transform: translate(0,0) scale(1); }
    }
    @keyframes di {
      0%   { transform: translate(0,0) scale(1); }
      20%  { transform: translate(22vw,-18vh) scale(1.12); }
      42%  { transform: translate(10vw, 26vh) scale(0.88); }
      64%  { transform: translate(-20vw, 18vh) scale(1.1); }
      84%  { transform: translate(-12vw,-24vh) scale(0.9); }
      100% { transform: translate(0,0) scale(1); }
    }

    /* ── GRAIN OVERLAY ── */
    #grain {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0.38;
      mix-blend-mode: overlay;
      background-size: 180px 180px;
      background-repeat: repeat;
    }

    /* ── PAGE ── */
    .page { position: relative; z-index: 3; }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 18px 10px;
    }

    .nav-logo {
      width: 110px;
      height: 110px;
      flex-shrink: 0;
      object-fit: contain;
    }

    .notif-btn {
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 100px;
      color: rgba(255,255,255,0.95);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 6px 14px;
      transition: background 0.2s;
    }
    .notif-btn.active {
      background: rgba(255,255,255,0.38);
      color: #fff;
    }
    .notif-btn:active { opacity: 0.7; }

    /* ── MAIN ── */
    main { padding: 20px 14px 48px; }

    .add-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .page-label {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.82);
    }

    .add-btn {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: none;
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fg);
      padding: 9px 16px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .add-btn:active { opacity: 0.65; }

    /* ── EMPTY STATE ── */
    .empty-state {
      padding: 70px 0;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.68);
      line-height: 2.8;
    }

    /* ── FLIGHT ITEM ── */
    .flight-item {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s, transform 0.15s;
      color: #fff;
    }
    .flight-item.selected {
      background: rgba(255,255,255,0.3);
      border-color: rgba(255,255,255,0.55);
    }
    .flight-item.alerted {
      background: rgba(230,60,50,0.55);
      border-color: rgba(255,120,100,0.5);
    }
    .flight-item:active { transform: scale(0.985); }

    .flight-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .flight-route {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1;
    }
    .flight-route .arr {
      font-size: 13px;
      font-weight: 400;
      opacity: 0.72;
      margin: 0 3px;
    }
    .flight-price {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-align: right;
      line-height: 1;
    }
    .flight-mid {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .flight-date {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.82;
    }
    .alert-badge {
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.25);
      padding: 3px 8px;
      border-radius: 100px;
    }
    .flight-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.15);
    }
    .flight-target {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.80;
    }
    .flight-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checked-time {
      font-size: 9px;
      opacity: 0.72;
      letter-spacing: 0.05em;
    }
    .btn-sm {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.90);
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-sm:active { background: rgba(255,255,255,0.28); }

    .btn-book {
      background: rgba(255,255,255,0.92);
      border: none;
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #0d0d0d;
      padding: 4px 10px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      transition: opacity 0.2s;
    }
    .btn-book:active { opacity: 0.7; }

    /* ── BOTTOM SHEET ── */
    .sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .sheet-overlay.open { opacity: 1; pointer-events: all; }

    .sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(220,240,255,0.9);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 22px 22px 0 0;
      border-top: 1px solid rgba(255,255,255,0.7);
      z-index: 101;
      padding: 0 16px calc(env(safe-area-inset-bottom,16px) + 20px);
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
      max-height: 92vh;
      overflow-y: auto;
    }
    .sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 3px;
      background: rgba(0,0,0,0.14);
      border-radius: 2px;
      margin: 12px auto 0;
    }
    .sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0 14px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }
    .sheet-title {
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--fg);
    }
    .sheet-close {
      background: rgba(0,0,0,0.07); border: none; border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--dim); padding: 5px 12px; cursor: pointer;
    }

    .field { margin-bottom: 14px; }
    .field-label {
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 6px; display: block;
    }

    /* airport picker trigger */
    .airport-trigger {
      width: 100%;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 10px;
      font-family: 'Space Mono', monospace;
      font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--fg); padding: 11px 12px;
      cursor: pointer; text-align: left;
      transition: background 0.2s;
      display: flex; align-items: center; justify-content: space-between;
    }
    .airport-trigger.placeholder { color: var(--dim); }
    .airport-trigger:active { background: rgba(255,255,255,0.9); }

    .field input[type="date"], .field input[type="number"], .field select {
      width: 100%;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 100px;
      color: var(--fg);
      font-family: 'Space Mono', monospace;
      font-size: 12px; letter-spacing: 0.05em; text-transform: uppercase;
      padding: 11px 18px; outline: none; -webkit-appearance: none;
      transition: background 0.2s;
    }
    .field input::placeholder { color: var(--dim); }
    .field input:focus, .field select:focus { background: rgba(255,255,255,0.82); }
    .field select option { background: #e4f2fa; }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .submit-btn {
      width: 100%; background: #0d0d0d; color: #fff;
      border: none; border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 16px; cursor: pointer; margin-top: 8px;
      transition: opacity 0.2s;
    }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .submit-btn:active { opacity: 0.8; }

    /* ── AIRPORT SEARCH MODAL ── */
    .airport-modal {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.35);
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .airport-modal.open { opacity: 1; pointer-events: all; }

    .airport-panel {
      background: rgba(225,242,255,0.95);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 22px 22px 0 0;
      border-top: 1px solid rgba(255,255,255,0.7);
      flex: 1;
      margin-top: auto;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    }
    .airport-modal.open .airport-panel { transform: translateY(0); }

    .airport-panel-handle {
      width: 36px; height: 3px;
      background: rgba(0,0,0,0.14);
      border-radius: 2px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }

    .airport-search-wrap {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      flex-shrink: 0;
    }

    .airport-search-input {
      width: 100%;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--fg);
      padding: 10px 16px;
      outline: none;
      -webkit-appearance: none;
    }
    .airport-search-input::placeholder { color: var(--dim); }
    .airport-search-input:focus { background: rgba(255,255,255,0.95); }

    .airport-results {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0 calc(env(safe-area-inset-bottom,0px) + 16px);
    }

    .airport-item {
      display: flex; align-items: center;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.15s;
      gap: 12px;
    }
    .airport-item:active { background: rgba(255,255,255,0.5); }

    /* Hierarchy drill-down */
    .airport-nav {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px 0; flex-shrink: 0;
    }
    .airport-nav-back {
      background: none; border: none;
      font-family: 'Space Mono', monospace;
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--fg); padding: 4px 0; cursor: pointer;
    }
    .airport-nav-crumb {
      font-family: 'Space Mono', monospace;
      font-size: 9px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--dim); flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .hier-item {
      display: flex; align-items: center;
      padding: 14px 16px; cursor: pointer;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      transition: background 0.15s;
    }
    .hier-item:active { background: rgba(255,255,255,0.5); }
    .hier-name { flex: 1; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--fg); }
    .hier-meta { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--dim); margin-right: 8px; letter-spacing: 0.06em; }
    .hier-arrow { color: var(--dim); font-size: 14px; }

    .region-header {
      font-family: 'Space Mono', monospace;
      font-size: 9px; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--dim);
      padding: 10px 16px 4px;
      pointer-events: none;
    }

    .airport-code {
      font-family: 'Space Mono', monospace;
      font-size: 14px; font-weight: 700;
      letter-spacing: 0.08em; color: var(--fg);
      flex-shrink: 0; width: 38px;
    }

  function applyPalette(p, animate = true) {
    const dur = animate ? '' : '0s';
    const bg = document.getElementById('grad-bg');
    // b1-b5 from palette; b6=like b4, b8=like b1, b7 stays off-white
    const mapping = ['b1','b2','b3','b4','b5','b6','b8'];
    const pidx    = [0, 1, 2, 3, 4, 3, 0];
    mapping.forEach((id, mi) => {
      const el = document.getElementById(id);
      if (!el) return;
      if (!animate) el.style.transition = 'none';
      el.style.background = p[pidx[mi]];
      if (!animate) setTimeout(() => el.style.transition = '', 30);
    });
    if (!animate) bg.style.transition = 'none';
    bg.style.background = p[5];
    if (!animate) setTimeout(() => bg.style.transition = '', 30);
  }

  // ── Static canvas grain (generated once, no flicker) ──
  const grainEl = document.getElementById('grain');
  (function() {
    const size = 256;
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx = c.getContext('2d');
    const img = ctx.createImageData(size, size);
    for (let i = 0; i < img.data.length; i += 4) {
      const v = Math.random() * 255 | 0;
      img.data[i] = v; img.data[i+1] = v; img.data[i+2] = v; img.data[i+3] = 255;
    }
    ctx.putImageData(img, 0, 0);
    grainEl.style.backgroundImage = `url(${c.toDataURL('image/png')})`;
  })();

  // ── Lava turbulence animation ──
  (function() {
    const ft = document.getElementById('lava-turb');
    if (!ft) return;
    let t = 0;
    function tick() {
      t += 0.00018;
      const bx = 0.007 + Math.sin(t * 0.8) * 0.0025;
      const by = 0.005 + Math.cos(t * 0.6) * 0.002;
      ft.setAttribute('baseFrequency', bx.toFixed(5) + ' ' + by.toFixed(5));
      requestAnimationFrame(tick);
    }
    tick();
  })();

  const SKY_CABIN = {1:'economy', 2:'premiumeconomy', 3:'business', 4:'first'};
  function toSkyDate(s) { return s ? s.replace(/-/g,'').slice(2) : null; }
  function buildBookingUrl(f, overrideO, overrideD) {
    const o = (overrideO || CITY_FIRST_MAP[f.origin] || f.origin).toLowerCase();
    const d = (overrideD || CITY_FIRST_MAP[f.destination] || f.destination).toLowerCase();
    const cabin = SKY_CABIN[f.cabin_class || 1] || 'economy';
    const pax = f.passengers || 1;
    const out = toSkyDate(f.departure_date);
    const ret = toSkyDate(f.return_date);
    const base = `https://www.skyscanner.com.tw/transport/flights/${o}/${d}/${out}`;
    return ret ? `${base}/${ret}/?adults=${pax}&cabinclass=${cabin}` : `${base}/?adults=${pax}&cabinclass=${cabin}`;
  }

  // ── Airport hierarchy data ──
  const REGION_META = {
    '台灣':      { continent:'亞洲', sub:'東亞'   },
    '日本':      { continent:'亞洲', sub:'東亞'   },
    '韓國':      { continent:'亞洲', sub:'東亞'   },
    '中國大陸':  { continent:'亞洲', sub:'東亞'   },
    '香港・澳門': { continent:'亞洲', sub:'東亞'   },
    '東南亞':    { continent:'亞洲', sub:'東南亞' },
    '南亞':      { continent:'亞洲', sub:'南亞'   },
    '中東':      { continent:'中東', sub:'中東'   },
    '歐洲':      { continent:'歐洲', sub:'歐洲'   },
    '北美洲':    { continent:'美洲', sub:'北美洲' },
    '大洋洲':    { continent:'大洋洲', sub:'大洋洲'},
    '非洲':      { continent:'非洲', sub:'非洲'   },
  };
  // For continents with sub-regions under Asia; others go continent→country directly
  const CONTINENT_SUBS = {
    '亞洲': ['東亞','東南亞','南亞'],
  };
  const SUB_REGIONS = {
    '東亞':   ['台灣','日本','韓國','中國大陸','香港・澳門'],
    '東南亞': ['東南亞'],
    '南亞':   ['南亞'],
  };
  const CONTINENTS = ['亞洲','中東','歐洲','美洲','大洋洲','非洲'];
  // Taiwan airports with international routes (shown pinned in origin picker)
  const TW_INTL = ['TPE','TSA','KHH','RMQ'];

  // Allowed destination regions per origin (null = no restriction)
  const ORIGIN_ALLOWED_REGIONS = {
    // 高雄：東亞 + 東南亞，無法直飛歐美中東大洋洲
    KHH: ['台灣','日本','韓國','中國大陸','香港・澳門','東南亞'],
    // 松山：東亞商務航線為主
    TSA: ['台灣','日本','韓國','中國大陸','香港・澳門'],
    // 台中：東亞 + 部分東南亞
    RMQ: ['台灣','日本','韓國','中國大陸','香港・澳門','東南亞'],
    // 桃園：全球（不限制）
    TPE: null,
  };

  // Return airport pool filtered by allowed regions for selected origin,
  // and always excluding the origin airport itself (including city-group members)
  function getAirportPool() {
    if (activeAirportTarget !== 'destination') return AIRPORTS;
    const origin = (document.getElementById('origin').value || '').toUpperCase();
    const allowed = ORIGIN_ALLOWED_REGIONS[origin];
    let pool = allowed ? AIRPORTS.filter(a => allowed.includes(a.region)) : [...AIRPORTS];
    if (origin) {
      const cityGroup = CITY_GROUPS.find(cg => cg.code === origin);
      const excludeCodes = cityGroup ? cityGroup.airports : [origin];
      pool = pool.filter(a => !excludeCodes.includes(a.code));
    }
    return pool;
  }

  function getCityGroupPool() {
    if (activeAirportTarget !== 'destination') return CITY_GROUPS;
    const origin = (document.getElementById('origin').value || '').toUpperCase();
    const allowed = ORIGIN_ALLOWED_REGIONS[origin];
    let groups = allowed ? CITY_GROUPS.filter(cg => {
      const ref = AIRPORTS.find(a => cg.airports.includes(a.code));
      return ref && allowed.includes(ref.region);
    }) : [...CITY_GROUPS];
    if (origin) {
      const cityGroup = CITY_GROUPS.find(cg => cg.code === origin);
      const excludeCodes = cityGroup ? cityGroup.airports : [origin];
      groups = groups.filter(cg => cg.code !== origin && !cg.airports.some(c => excludeCodes.includes(c)));
    }
    return groups;
  }

  // ── Airport modal state ──
  const airportModal = document.getElementById('airport-modal');
  let activeAirportTarget = null;
  let navPath = []; // e.g. ['亞洲','東亞','日本']

  function openAirportModal(target) {
    activeAirportTarget = target;
    navPath = [];
    document.getElementById('airport-search').value = '';
    document.getElementById('airport-search-wrap').style.display = '';
    if (target === 'origin') {
      // Taiwan airports pinned at top, then full hierarchy below
      const pinned = AIRPORTS.filter(a => TW_INTL.includes(a.code));
      document.getElementById('airport-results').innerHTML =
        `<div class="region-header">台灣 — 優先選項</div>` +
        pinned.map(a => airportItemHTML(a)).join('') +
        `<div class="region-header" style="margin-top:8px">其他出發地</div>` +
        CONTINENTS.map(c => {
          const cnt = airportsForContinent(c).length;
          return hierItemHTML(c, cnt + ' 個機場', `drillDown('${c}')`);
        }).join('');
    } else {
      renderHierarchy();
    }
    airportModal.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeAirportModal() {
    airportModal.classList.remove('open');
    document.body.style.overflow = '';
    activeAirportTarget = null;
    document.getElementById('airport-search-wrap').style.display = '';
  }

  document.getElementById('modal-backdrop').addEventListener('click', closeAirportModal);

  function airportItemHTML(a) {
    const safeName = a.name.replace(/'/g,"\\'");
    return `<div class="airport-item" onclick="selectAirport('${a.code}','${safeName}')">
      <div class="airport-code">${a.code}</div>
      <div class="airport-info">
        <div class="airport-name">${a.name}</div>
        <div class="airport-country">${a.country}</div>
      </div>
    </div>`;
  }

  function cityGroupItemHTML(cg) {
    const safeName = (cg.city + ' 任一機場').replace(/'/g,"\\'");
    return `<div class="airport-item" style="background:rgba(255,255,255,0.18)"
              onclick="selectAirport('${cg.code}','${safeName}')">
      <div class="airport-code" style="font-size:11px">${cg.code}</div>
      <div class="airport-info">
        <div class="airport-name">${cg.city} <span style="opacity:0.55;font-size:11px">任一機場</span></div>
        <div class="airport-country">${cg.airports.join(' · ')} — 比較最低價</div>
      </div>
      <div style="font-size:9px;color:var(--dim);flex-shrink:0">✦</div>
    </div>`;
  }

  function hierItemHTML(name, meta, onclick) {
    return `<div class="hier-item" onclick="${onclick}">
      <div class="hier-name">${name}</div>
      ${meta ? `<div class="hier-meta">${meta}</div>` : ''}
      <div class="hier-arrow">›</div>
    </div>`;
  }

  function updateNavBar() {
    const nav = document.getElementById('airport-nav');
    const crumb = document.getElementById('airport-nav-crumb');
    if (navPath.length === 0) {
      nav.style.display = 'none';
    } else {
      nav.style.display = '';
      crumb.textContent = navPath.join(' › ');
    }
  }

  function drillDown(item) {
    navPath.push(item);
    document.getElementById('airport-search').value = '';
    renderHierarchy();
  }

  function navBack() {
    navPath.pop();
    document.getElementById('airport-search').value = '';
    renderHierarchy();
  }

  function airportsInRegions(regions) {
    return getAirportPool().filter(a => regions.includes(a.region));
  }

  function airportsForContinent(continent) {
    return getAirportPool().filter(a => {
      const m = REGION_META[a.region];
      return m && m.continent === continent;
    });
  }

  function renderHierarchy() {
    updateNavBar();
    const results = document.getElementById('airport-results');
    const depth = navPath.length;

    if (depth === 0) {
      // Level 0: continents — hide if no reachable airports
      results.innerHTML = CONTINENTS.map(c => {
        const cnt = airportsForContinent(c).length;
        if (!cnt) return '';
        return hierItemHTML(c, cnt + ' 個機場', `drillDown('${c}')`);
      }).join('');

    } else if (depth === 1) {
      const continent = navPath[0];
      const subs = CONTINENT_SUBS[continent];
      if (subs) {
        // Level 1: subregions — hide if no reachable airports
        results.innerHTML = subs.map(sub => {
          const regions = SUB_REGIONS[sub];
          const cnt = airportsInRegions(regions).length;
          if (!cnt) return '';
          return hierItemHTML(sub, cnt + ' 個機場', `drillDown('${sub}')`);
        }).join('');
      } else {
        // Level 1→countries directly (non-Asia)
        const byCountry = {};
        airportsForContinent(continent).forEach(a => {
          if (!byCountry[a.country]) byCountry[a.country] = [];
          byCountry[a.country].push(a);
        });
        results.innerHTML = Object.keys(byCountry).map(c => {
          const cnt = byCountry[c].length;
          return hierItemHTML(c, cnt + ' 個機場', `drillDown('${c.replace(/'/g,"\\'")}')`)
        }).join('');
      }

    } else if (depth === 2) {
      const continent = navPath[0];
      const subs = CONTINENT_SUBS[continent];
      if (subs) {
        // Level 2: countries within subregion
        const sub = navPath[1];
        const regions = SUB_REGIONS[sub];
        const byCountry = {};
        airportsInRegions(regions).forEach(a => {
          if (!byCountry[a.country]) byCountry[a.country] = [];
          byCountry[a.country].push(a);
        });
        results.innerHTML = Object.keys(byCountry).map(c => {
          const list = byCountry[c];
          if (list.length === 1) {
            return airportItemHTML(list[0]);
          }
          return hierItemHTML(c, list.length + ' 個機場', `drillDown('${c.replace(/'/g,"\\'")}')`)
        }).join('');
      } else {
        // Level 2: airports in country (non-Asia)
        const country = navPath[1];
        results.innerHTML = renderAirportsByCountry(country);
      }

    } else if (depth === 3) {
      // Level 3: airports in country (Asia path)
      const country = navPath[2];
      results.innerHTML = renderAirportsByCountry(country);
    }
  }

  function renderAirportsByCountry(country) {
    const groups = getCityGroupPool().filter(cg => cg.country === country && cg.airports.length > 1);
    const airports = getAirportPool().filter(a => a.country === country);
    const groupHtml = groups.map(cg => cityGroupItemHTML(cg)).join('');
    const airportHtml = airports.map(a => airportItemHTML(a)).join('');
    return (groups.length ? `<div class="region-header">城市任選</div>${groupHtml}<div class="region-header">個別機場</div>` : '') + airportHtml;
  }

  document.getElementById('airport-search').addEventListener('input', function() {
    const q = this.value.trim();
    const results = document.getElementById('airport-results');
    if (q.length === 0) {
      navPath = [];
      renderHierarchy();
      return;
    }
    navPath = []; updateNavBar();
    const lower = q.toLowerCase();
    const filtered = getAirportPool().filter(a =>
      a.code.toLowerCase().includes(lower) ||
      a.name.toLowerCase().includes(lower) ||
      a.country.toLowerCase().includes(lower)
    );
    results.innerHTML = filtered.slice(0, 80).map(a => airportItemHTML(a)).join('');
  });

  function selectAirport(code, name) {
    if (!activeAirportTarget) return;
    document.getElementById(activeAirportTarget).value = code;
    const inputEl = document.getElementById(activeAirportTarget + '-input');
    if (inputEl) inputEl.value = code + ' · ' + name;
    closeAirportModal();
    if (activeAirportTarget === 'destination') applyPalette(getPalette(code));
  }

  // ── Inline airport suggestions ──
  function openSuggestions(target, query) {
    activeAirportTarget = target;
    const inputEl = document.getElementById(target + '-input');
    const rect = inputEl.getBoundingClientRect();
    const sugEl = document.getElementById(target + '-suggestions');
    sugEl.style.top = (rect.bottom + 4) + 'px';
    sugEl.style.left = rect.left + 'px';
    sugEl.style.width = rect.width + 'px';

    const lower = (query || '').toLowerCase().trim();
    const airports = target === 'destination' ? getAirportPool() : AIRPORTS;
    const cityGroups = target === 'destination' ? getCityGroupPool() : CITY_GROUPS;

    let combined = [];
    if (lower.length >= 1) {
      const filteredGroups = cityGroups.filter(cg =>
        cg.code.toLowerCase().startsWith(lower) ||
        cg.city.toLowerCase().includes(lower) ||
        (cg.nameEn && cg.nameEn.toLowerCase().includes(lower)) ||
        cg.country.toLowerCase().includes(lower)
      );
      const filteredAirports = airports.filter(a =>
        a.code.toLowerCase().startsWith(lower) ||
        a.name.toLowerCase().includes(lower) ||
        a.country.toLowerCase().includes(lower)
      );
      combined = [
        ...filteredGroups.map(cg => ({code: cg.code, name: cg.city + ' 任一機場', country: cg.country})),
        ...filteredAirports.map(a => ({code: a.code, name: a.name, country: a.country})),
      ].slice(0, 6);
    }

    const itemsHtml = combined.map(item =>
      `<div class="sug-item" onmousedown="selectAirportInline('${target}','${item.code}','${item.name.replace(/'/g,"\\'")}')">
        <div class="sug-code">${item.code}</div>
        <div class="sug-info">
          <div class="sug-name">${item.name}</div>
          <div class="sug-country">${item.country}</div>
        </div>
      </div>`
    ).join('');

    const emptyHtml = combined.length === 0 && lower.length >= 1
      ? `<div style="padding:12px;font-size:10px;color:var(--dim);text-align:center;letter-spacing:0.08em">找不到符合機場</div>`
      : '';

    const browseHtml = `<div class="sug-browse" onmousedown="selectBrowse('${target}')">瀏覽所有機場 ›</div>`;
    sugEl.innerHTML = itemsHtml + emptyHtml + browseHtml;
    sugEl.classList.add('open');
  }

  function closeSuggestions(target) {
    const sugEl = document.getElementById(target + '-suggestions');
    if (sugEl) sugEl.classList.remove('open');
  }

  function selectAirportInline(target, code, name) {
    document.getElementById(target).value = code;
    document.getElementById(target + '-input').value = code + ' · ' + name;
    closeSuggestions(target);
    if (target === 'destination') applyPalette(getPalette(code));
  }

  function selectBrowse(target) {
    closeSuggestions(target);
    openAirportModal(target);
  }

  // Text input event listeners
  ['origin', 'destination'].forEach(function(target) {
    var inputEl = document.getElementById(target + '-input');
    inputEl.addEventListener('focus', function() {
      var val = this.value.trim();
      if (val.includes(' · ')) {
        // Already selected — show just browse link
        activeAirportTarget = target;
        var sugEl = document.getElementById(target + '-suggestions');
        var rect = this.getBoundingClientRect();
        sugEl.style.top = (rect.bottom + 4) + 'px';
        sugEl.style.left = rect.left + 'px';
        sugEl.style.width = rect.width + 'px';
        sugEl.innerHTML = `<div class="sug-browse" onmousedown="selectBrowse('${target}')">瀏覽所有機場 ›</div>`;
        sugEl.classList.add('open');
      } else {
        openSuggestions(target, val);
      }
    });
    inputEl.addEventListener('input', function() {
      document.getElementById(target).value = '';
      openSuggestions(target, this.value);
    });
    inputEl.addEventListener('blur', function() {
      // Auto-match exact code on blur
      var val = this.value.trim().toUpperCase();
      var hiddenEl = document.getElementById(target);
      if (!hiddenEl.value && val.length >= 2 && !val.includes('·')) {
        var match = AIRPORTS.find(function(a) { return a.code === val; });
        if (match) {
          hiddenEl.value = match.code;
          inputEl.value = match.code + ' · ' + match.name;
        } else {
          var cg = CITY_GROUPS.find(function(c) { return c.code === val; });
          if (cg) {
            hiddenEl.value = cg.code;
            inputEl.value = cg.code + ' · ' + cg.city + ' 任一機場';
          }
        }
      }
      setTimeout(function() { closeSuggestions(target); }, 120);
    });
  });

  // ── Return date auto-fill (departure + 1 day) ──
  document.getElementById('departure_date').addEventListener('change', function() {
    const retEl = document.getElementById('return_date');
    if (this.value) {
      const d = new Date(this.value + 'T00:00:00');
      d.setDate(d.getDate() + 1);
      retEl.value = d.toISOString().split('T')[0];
    }
  });

  // ── Toast ──
  function showToast(msg, d=2500) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), d);
  }

  function fmtPrice(p, cur) { return p == null ? '—' : p.toLocaleString() + ' ' + cur; }

  function timeSince(str) {
    if (!str) return 'Not checked';
    const h = Math.floor((Date.now() - new Date(str+'Z').getTime()) / 3600000);
    if (h < 1) return 'Just now';
    if (h < 24) return h + 'h ago';
    return Math.floor(h/24) + 'd ago';
  }

  let allFlights = [];
  let selectedId = null;

  function updateBg() {
    if (allFlights.some(f => f.target_price && f.current_price && f.current_price <= f.target_price)) {
      applyPalette(PALETTES.ALERT); return;
    }
    if (selectedId) {
      const f = allFlights.find(x => x.id === selectedId);
      if (f) { applyPalette(getPalette(f.destination)); return; }
    }
    if (allFlights.length) applyPalette(getPalette(allFlights[0].destination));
    else applyPalette(PALETTES.DEFAULT);
  }

  function renderFlights(flights) {
    allFlights = flights;
    const list = document.getElementById('flight-list');
    if (!flights.length) {
      list.innerHTML = '<div class="empty-state">No flights tracked.<br>Add one above.</div>';
      updateBg(); return;
    }
    const CABIN_LABELS = {1:'',2:'Prem Eco',3:'Business',4:'First'};
    list.innerHTML = flights.map(f => {
      const alerted  = f.target_price && f.current_price && f.current_price <= f.target_price;
      const selected = f.id === selectedId;
      let cls = 'flight-item' + (alerted ? ' alerted' : '') + (selected ? ' selected' : '');
      const tripLabel = f.return_date ? 'RT' : 'OW';
      const pax = f.passengers || 1;
      const cabin = f.cabin_class || 1;
      const extraMeta = [
        pax > 1 ? pax + ' pax' : '',
        CABIN_LABELS[cabin] || '',
      ].filter(Boolean).join(' · ');
      return `<div class="${cls}" data-id="${f.id}" onclick="selectFlight(${f.id})">
        <div class="flight-top">
          <div class="flight-route">${f.origin}<span class="arr"> → </span>${f.destination}</div>
          <div class="flight-price">${fmtPrice(f.current_price, f.currency)}</div>
        </div>
        <div class="flight-mid">
          <div class="flight-date">${f.departure_date}${f.return_date?' · '+f.return_date:''} · ${tripLabel}${extraMeta?' · '+extraMeta:''}</div>
          ${alerted ? '<span class="alert-badge">↓ Below Target</span>' : ''}
        </div>
        <div class="flight-bottom">
          <div class="flight-target">${f.target_price ? 'Target: ' + fmtPrice(f.target_price, f.currency) : '追蹤中'}</div>
          <div class="flight-actions">
            <span class="checked-time">${timeSince(f.last_checked)}</span>
            <button class="btn-sm" onclick="event.stopPropagation();checkFlight(${f.id})">Check</button>
            <a class="btn-book" href="${buildBookingUrl(f)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Skyscanner</a>
            <button class="btn-sm" onclick="event.stopPropagation();deleteFlight(${f.id})">Del</button>
          </div>
        </div>
        ${(f.price_breakdown && f.price_breakdown.length > 1) ? `
        <div class="breakdown-list" onclick="event.stopPropagation()">
          ${f.price_breakdown.map(b => `
            <a class="breakdown-item" href="${buildBookingUrl(f, b.o, b.d)}" target="_blank" rel="noopener">
              <span class="bd-route">${b.o} → ${b.d}</span>
              <span class="bd-price">${fmtPrice(b.price, f.currency)}</span>
            </a>`).join('')}
        </div>` : ''}
      </div>`;
    }).join('');
    updateBg();
  }

  function selectFlight(id) {
    selectedId = selectedId === id ? null : id;
    renderFlights(allFlights);
  }

  async function loadFlights() {
    try { renderFlights(await (await fetch('/api/flights')).json()); }
    catch(e) { showToast('Load failed'); }
  }

  async function checkFlight(id) {
    try {
      if (!(await fetch(`/api/flights/${id}/check`, {method:'POST'})).ok) throw 0;
      showToast('Updated');
    } catch(e) { showToast('Check failed'); }
    await loadFlights();
  }

  async function deleteFlight(id) {
    if (selectedId === id) selectedId = null;
    try { await fetch(`/api/flights/${id}`, {method:'DELETE'}); await loadFlights(); }
    catch(e) { showToast('Delete failed'); }
  }

  document.getElementById('submit-btn').addEventListener('click', async () => {
    const origin       = document.getElementById('origin').value;
    const destination  = document.getElementById('destination').value;
    const dep          = document.getElementById('departure_date').value;
    const ret          = document.getElementById('return_date').value;
    const target       = document.getElementById('target_price').value;
    const currency     = document.getElementById('currency').value;
    const passengers   = document.getElementById('passengers').value;
    const cabin_class  = document.getElementById('cabin_class').value;

    if (!origin || !destination || !dep) { showToast('請選擇機場與出發日期'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = '新增中...';

    try {
      const r = await fetch('/api/flights', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          origin, destination, departure_date:dep,
          return_date: ret || null,
          target_price: target ? parseInt(target) : null,
          currency, passengers: parseInt(passengers), cabin_class: parseInt(cabin_class),
        })
      });
      if (!r.ok) throw 0;
      closeSheet();
      showToast('航班已新增');
      ['origin','destination','departure_date','return_date','target_price'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('passengers').value = '1';
      document.getElementById('cabin_class').value = '1';
      document.getElementById('origin-input').value = '';
      document.getElementById('destination-input').value = '';
      await loadFlights();
    } catch(e) { showToast('新增失敗'); updateBg(); }
    finally { btn.disabled = false; btn.textContent = '新增航班'; }
  });

  // ── Push notifications ──
  const notifBtn = document.getElementById('notif-btn');
  let pushSub = null;

  async function initPush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    try {
      const reg = await navigator.serviceWorker.register('/static/sw.js');
      pushSub = await reg.pushManager.getSubscription();
      notifBtn.classList.toggle('active', !!pushSub);
    } catch(e) {}
  }

  notifBtn.addEventListener('click', async () => {
    if (!('serviceWorker' in navigator)) { showToast('Not supported'); return; }
    try {
      const reg = await navigator.serviceWorker.ready;
      if (pushSub) {
        await fetch('/api/unsubscribe', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({endpoint: pushSub.endpoint})});
        await pushSub.unsubscribe();
        pushSub = null; notifBtn.classList.remove('active'); showToast('通知已關閉');
      } else {
        if (await Notification.requestPermission() !== 'granted') { showToast('權限被拒絕'); return; }
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlB64(VAPID_PUBLIC_KEY)
        });
        await fetch('/api/subscribe', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(sub)});
        pushSub = sub; notifBtn.classList.add('active'); showToast('通知已開啟');
      }
    } catch(e) { showToast('Error'); }
  });

  function urlB64(s) {
    const p = '='.repeat((4 - s.length%4)%4);
    const b = (s+p).replace(/-/g,'+').replace(/_/g,'/');
    return Uint8Array.from([...atob(b)].map(c=>c.charCodeAt(0)));
  }

  applyPalette(PALETTES.DEFAULT, false);
  initPush();
  loadFlights();
</script>
</body>
</html>
