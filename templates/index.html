<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7bc8e2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MFF" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <title>MFF</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --b1: #7bc8e2;
      --b2: #a8dff0;
      --b3: #ffffff;
      --b4: #c8ecf8;
      --fg: #0d0d0d;
      --dim: rgba(13,13,13,0.38);
      --line: rgba(13,13,13,0.1);
    }

    html, body {
      min-height: 100vh;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── ANIMATED GRADIENT BACKGROUND ── */
    .gradient-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: var(--b4);
      transition: background 1.2s ease;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.75;
      transition: background 1.2s ease, width 1.2s ease, height 1.2s ease;
      will-change: transform;
    }

    .blob-1 {
      width: 65vw;
      height: 65vw;
      background: var(--b1);
      top: -15%;
      left: -10%;
      animation: drift1 12s ease-in-out infinite;
    }

    .blob-2 {
      width: 55vw;
      height: 55vw;
      background: var(--b2);
      bottom: 5%;
      right: -15%;
      animation: drift2 16s ease-in-out infinite;
    }

    .blob-3 {
      width: 45vw;
      height: 45vw;
      background: var(--b3);
      top: 35%;
      left: 25%;
      animation: drift3 10s ease-in-out infinite;
    }

    @keyframes drift1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(8vw, 6vh) scale(1.08); }
      66%       { transform: translate(-4vw, 10vh) scale(0.94); }
    }
    @keyframes drift2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      40%       { transform: translate(-10vw, -8vh) scale(1.1); }
      70%       { transform: translate(6vw, -4vh) scale(0.92); }
    }
    @keyframes drift3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(-8vw, 8vh) scale(1.12); }
    }

    /* SVG grain overlay */
    .grain {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.22;
      mix-blend-mode: overlay;
    }

    /* page content sits above bg */
    .page {
      position: relative;
      z-index: 2;
    }

    /* ── NAV PILL ── */
    .nav-wrap {
      padding: 14px 14px 0;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    nav {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 100px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      transition: background 0.4s;
    }

    .nav-logo {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--fg);
    }

    .notif-btn {
      background: none;
      border: none;
      color: var(--dim);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }
    .notif-btn.active { color: var(--fg); }

    /* ── MAIN ── */
    main { padding: 28px 14px 40px; }

    .add-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .page-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .add-btn {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: none;
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fg);
      padding: 8px 16px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .add-btn:active { opacity: 0.65; }

    /* ── EMPTY STATE ── */
    .empty-state {
      padding: 60px 0;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      line-height: 2.6;
    }

    /* ── FLIGHT ITEM ── */
    .flight-item {
      background: rgba(255,255,255,0.62);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      border: 1px solid rgba(255,255,255,0.5);
    }

    .flight-item:active { transform: scale(0.98); }

    .flight-item.selected {
      background: rgba(255,255,255,0.88);
      border-color: rgba(255,255,255,0.9);
    }

    .flight-item.alerted {
      background: rgba(255,255,255,0.72);
    }

    .flight-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .flight-route {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1;
    }

    .flight-route .arrow {
      font-size: 13px;
      font-weight: 400;
      opacity: 0.35;
      margin: 0 3px;
    }

    .flight-price {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .price-alerted { color: #d63030; }

    .flight-mid {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .flight-date {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .alert-badge {
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: #d63030;
      color: #fff;
      padding: 3px 8px;
      border-radius: 100px;
    }

    .flight-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid rgba(13,13,13,0.07);
    }

    .flight-target {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .flight-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checked-time {
      font-size: 9px;
      letter-spacing: 0.06em;
      color: var(--dim);
      opacity: 0.7;
    }

    .btn-sm {
      background: rgba(13,13,13,0.07);
      border: none;
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-sm:active { background: rgba(13,13,13,0.15); }

    /* ── BOTTOM SHEET ── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .sheet-overlay.open { opacity: 1; pointer-events: all; }

    .sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(240,248,255,0.92);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: 22px 22px 0 0;
      border-top: 1px solid rgba(255,255,255,0.7);
      z-index: 101;
      padding: 0 18px calc(env(safe-area-inset-bottom, 16px) + 20px);
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 92vh;
      overflow-y: auto;
    }
    .sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px;
      height: 3px;
      background: rgba(0,0,0,0.12);
      border-radius: 2px;
      margin: 12px auto 0;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0 14px;
      border-bottom: 1px solid rgba(13,13,13,0.08);
      margin-bottom: 20px;
    }

    .sheet-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .sheet-close {
      background: rgba(0,0,0,0.07);
      border: none;
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
      padding: 5px 12px;
      cursor: pointer;
    }

    .field { margin-bottom: 16px; }

    .field-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 6px;
      display: block;
    }

    .field input, .field select {
      width: 100%;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 10px;
      color: var(--fg);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 11px 12px;
      outline: none;
      -webkit-appearance: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .field input::placeholder { color: var(--dim); }
    .field input:focus, .field select:focus {
      background: rgba(255,255,255,0.95);
      border-color: rgba(255,255,255,1);
    }
    .field select option { background: #e8f4f8; }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .submit-btn {
      width: 100%;
      background: #0d0d0d;
      color: #fff;
      border: none;
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 16px;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.2s;
    }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .submit-btn:active { opacity: 0.8; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
      left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: rgba(13,13,13,0.88);
      backdrop-filter: blur(12px);
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 9px 18px;
      border-radius: 100px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.22s;
      z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Animated gradient background -->
<div class="gradient-bg" id="grad-bg">
  <div class="blob blob-1" id="blob1"></div>
  <div class="blob blob-2" id="blob2"></div>
  <div class="blob blob-3" id="blob3"></div>
</div>

<!-- SVG grain filter -->
<svg class="grain" xmlns="http://www.w3.org/2000/svg">
  <filter id="grain-filter" x="0%" y="0%" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch" result="noise"/>
    <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
    <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#grain-filter)" opacity="1"/>
</svg>

<div class="page">
  <div class="nav-wrap">
    <nav>
      <div class="nav-logo">MFF ●</div>
      <button class="notif-btn" id="notif-btn">Notify</button>
    </nav>
  </div>

  <main>
    <div class="add-row">
      <span class="page-label">Price Tracker</span>
      <button class="add-btn" id="open-sheet-btn">+ Track Flight</button>
    </div>
    <div id="flight-list">
      <div class="empty-state">No flights tracked.<br>Add one above.</div>
    </div>
  </main>
</div>

<!-- Bottom Sheet -->
<div class="sheet-overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">Track Flight</span>
    <button class="sheet-close" id="close-sheet-btn">Close</button>
  </div>
  <div class="field-row">
    <div class="field">
      <label class="field-label">From</label>
      <input type="text" id="origin" placeholder="TPE" maxlength="3" />
    </div>
    <div class="field">
      <label class="field-label">To</label>
      <input type="text" id="destination" placeholder="NRT" maxlength="3" />
    </div>
  </div>
  <div class="field-row">
    <div class="field">
      <label class="field-label">Depart</label>
      <input type="date" id="departure_date" />
    </div>
    <div class="field">
      <label class="field-label">Return</label>
      <input type="date" id="return_date" />
    </div>
  </div>
  <div class="field-row">
    <div class="field">
      <label class="field-label">Target Price</label>
      <input type="number" id="target_price" placeholder="8000" />
    </div>
    <div class="field">
      <label class="field-label">Currency</label>
      <select id="currency">
        <option value="TWD">TWD</option>
        <option value="USD">USD</option>
        <option value="JPY">JPY</option>
        <option value="EUR">EUR</option>
        <option value="KRW">KRW</option>
      </select>
    </div>
  </div>
  <button class="submit-btn" id="submit-btn">Add Flight</button>
</div>

<div class="toast" id="toast"></div>

<script>
  const VAPID_PUBLIC_KEY = "{{ vapid_public_key }}";

  // ── Destination colour palettes ──
  // Each palette: [blob1, blob2, blob3, base]
  const PALETTES = {
    // Japan
    NRT: ['#f4b8d4','#c8a8f0','#a8d0f8','#dcc8f0'],
    TYO: ['#f4b8d4','#c8a8f0','#a8d0f8','#dcc8f0'],
    KIX: ['#f4b8d4','#c8a8f0','#a8d0f8','#dcc8f0'],
    OSA: ['#f4b8d4','#c8a8f0','#a8d0f8','#dcc8f0'],
    CTS: ['#c8e4f8','#e8f4ff','#a8ccf0','#d8eef8'],
    OKA: ['#a8f0e4','#f0f090','#80d8f0','#c8f0e4'],
    // Korea
    ICN: ['#80c8f8','#a0f0d8','#c8e8f8','#b0e0f4'],
    GMP: ['#80c8f8','#a0f0d8','#c8e8f8','#b0e0f4'],
    // China
    PEK: ['#f8c080','#f8e040','#f09060','#f8d8a0'],
    PVG: ['#f8c080','#f8e040','#f09060','#f8d8a0'],
    CAN: ['#f8c080','#f8e040','#f09060','#f8d8a0'],
    // Southeast Asia
    BKK: ['#60e8c0','#a0f870','#40d8b0','#90f0c8'],
    SIN: ['#40d8b8','#90f040','#60e890','#78f0b0'],
    KUL: ['#50e8a0','#90f860','#30d8a0','#70f0a8'],
    CGK: ['#40e8b0','#a0f070','#60d898','#80f0b0'],
    MNL: ['#f8d060','#f89840','#f0c840','#f8d890'],
    SGN: ['#a8f070','#60e8b0','#f0f050','#b0f090'],
    HKT: ['#40e8d8','#f0f070','#80f8b8','#a0f0d0'],
    DPS: ['#60e8c8','#f8e870','#40d8b8','#90f0c8'],
    // Europe
    LHR: ['#f8e090','#f8c870','#e8d8a0','#f8e8b0'],
    CDG: ['#f8d890','#f0b870','#e8c890','#f8e0b0'],
    FCO: ['#f8c880','#f87060','#f8a860','#f8d8a0'],
    AMS: ['#f8d870','#f8b850','#e8c870','#f8e0a0'],
    FRA: ['#e8d890','#f8c070','#d8c880','#f0e0a0'],
    BCN: ['#f8b060','#f8e050','#f89040','#f8d080'],
    // North America
    LAX: ['#f89060','#f8c050','#f07040','#f8c090'],
    JFK: ['#f08060','#f8b040','#f06040','#f8b090'],
    SFO: ['#f89870','#f8c060','#f07050','#f8c0a0'],
    YYZ: ['#80b8f8','#c8e8f8','#a0c8f0','#b8dcf8'],
    YVR: ['#80c8f0','#c8ecf8','#a0d0f0','#b8e4f8'],
    // Middle East
    DXB: ['#f8d050','#f8a030','#f8b820','#f8d880'],
    DOH: ['#f8c840','#f8a820','#f0b040','#f8d070'],
    // Australia
    SYD: ['#f8d070','#f8c060','#f0e860','#f8d8a0'],
    MEL: ['#f0d090','#f8b870','#e8c880','#f8e0b0'],
    // Default sky
    DEFAULT: ['#7bc8e2','#a8dff0','#ffffff','#c8ecf8'],
    // Alert (price hit target)
    ALERT: ['#f87070','#f8b0a0','#f89080','#f8c0b0'],
  };

  function getPalette(iata) {
    const code = (iata || '').toUpperCase();
    return PALETTES[code] || PALETTES.DEFAULT;
  }

  // Detect if any flights have hit alert
  function hasAlert(flights) {
    return flights.some(f => f.current_price && f.current_price <= f.target_price);
  }

  let currentPalette = null;

  function applyPalette(palette, animate = true) {
    if (!animate) {
      document.getElementById('blob1').style.transition = 'none';
      document.getElementById('blob2').style.transition = 'none';
      document.getElementById('blob3').style.transition = 'none';
      document.querySelector('.gradient-bg').style.transition = 'none';
    }
    document.querySelector('.gradient-bg').style.background = palette[3];
    document.getElementById('blob1').style.background = palette[0];
    document.getElementById('blob2').style.background = palette[1];
    document.getElementById('blob3').style.background = palette[2];
    if (!animate) {
      setTimeout(() => {
        document.getElementById('blob1').style.transition = '';
        document.getElementById('blob2').style.transition = '';
        document.getElementById('blob3').style.transition = '';
        document.querySelector('.gradient-bg').style.transition = '';
      }, 50);
    }
  }

  let selectedFlightId = null;
  let allFlights = [];

  function updateBackground() {
    if (hasAlert(allFlights)) {
      applyPalette(PALETTES.ALERT);
      return;
    }
    if (selectedFlightId) {
      const f = allFlights.find(x => x.id === selectedFlightId);
      if (f) { applyPalette(getPalette(f.destination)); return; }
    }
    if (allFlights.length > 0) {
      // Use last added flight as default background
      applyPalette(getPalette(allFlights[0].destination));
    } else {
      applyPalette(PALETTES.DEFAULT);
    }
  }

  // ── Sheet ──
  const overlay = document.getElementById('overlay');
  const sheet = document.getElementById('sheet');

  function openSheet() {
    sheet.classList.add('open');
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeSheet() {
    sheet.classList.remove('open');
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('open-sheet-btn').addEventListener('click', openSheet);
  document.getElementById('close-sheet-btn').addEventListener('click', closeSheet);
  overlay.addEventListener('click', closeSheet);

  // ── Toast ──
  function showToast(msg, duration = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  function fmtPrice(price, currency) {
    if (price == null) return '—';
    return price.toLocaleString() + ' ' + currency;
  }

  function timeSince(str) {
    if (!str) return 'Not checked';
    const diff = Date.now() - new Date(str + 'Z').getTime();
    const h = Math.floor(diff / 3600000);
    if (h < 1) return 'Just now';
    if (h < 24) return h + 'h ago';
    return Math.floor(h / 24) + 'd ago';
  }

  function renderFlights(flights) {
    allFlights = flights;
    const list = document.getElementById('flight-list');
    if (!flights.length) {
      list.innerHTML = '<div class="empty-state">No flights tracked.<br>Add one above.</div>';
      updateBackground();
      return;
    }

    list.innerHTML = flights.map(f => {
      const alerted = f.current_price && f.current_price <= f.target_price;
      const selected = f.id === selectedFlightId;
      let cls = 'flight-item';
      if (alerted) cls += ' alerted';
      if (selected) cls += ' selected';
      const currentDisplay = f.current_price ? fmtPrice(f.current_price, f.currency) : '—';
      const priceClass = alerted ? 'flight-price price-alerted' : 'flight-price';
      const tripLabel = f.return_date ? 'RT' : 'OW';
      return `
        <div class="${cls}" data-id="${f.id}" onclick="selectFlight(${f.id})">
          <div class="flight-top">
            <div class="flight-route">
              ${f.origin}<span class="arrow"> → </span>${f.destination}
            </div>
            <div class="${priceClass}">${currentDisplay}</div>
          </div>
          <div class="flight-mid">
            <div class="flight-date">${f.departure_date}${f.return_date ? ' · ' + f.return_date : ''} · ${tripLabel}</div>
            ${alerted ? '<span class="alert-badge">↓ Below Target</span>' : ''}
          </div>
          <div class="flight-bottom">
            <div class="flight-target">Target: ${fmtPrice(f.target_price, f.currency)}</div>
            <div class="flight-actions">
              <span class="checked-time">${timeSince(f.last_checked)}</span>
              <button class="btn-sm" onclick="event.stopPropagation(); checkFlight(${f.id})">Check</button>
              <button class="btn-sm" onclick="event.stopPropagation(); deleteFlight(${f.id})">Del</button>
            </div>
          </div>
        </div>`;
    }).join('');

    updateBackground();
  }

  function selectFlight(id) {
    if (selectedFlightId === id) {
      selectedFlightId = null;
    } else {
      selectedFlightId = id;
    }
    renderFlights(allFlights);
  }

  async function loadFlights() {
    try {
      const r = await fetch('/api/flights');
      renderFlights(await r.json());
    } catch (e) { showToast('Load failed'); }
  }

  async function checkFlight(id) {
    try {
      const r = await fetch(`/api/flights/${id}/check`, { method: 'POST' });
      if (!r.ok) throw new Error();
      showToast('Updated');
    } catch (e) { showToast('Check failed'); }
    await loadFlights();
  }

  async function deleteFlight(id) {
    if (selectedFlightId === id) selectedFlightId = null;
    try {
      await fetch(`/api/flights/${id}`, { method: 'DELETE' });
      await loadFlights();
    } catch (e) { showToast('Delete failed'); }
  }

  document.getElementById('submit-btn').addEventListener('click', async () => {
    const origin = document.getElementById('origin').value.trim().toUpperCase();
    const destination = document.getElementById('destination').value.trim().toUpperCase();
    const departure_date = document.getElementById('departure_date').value;
    const return_date = document.getElementById('return_date').value;
    const target_price = document.getElementById('target_price').value;
    const currency = document.getElementById('currency').value;

    if (!origin || !destination || !departure_date || !target_price) {
      showToast('Fill all required fields');
      return;
    }

    // Preview the destination palette while adding
    applyPalette(getPalette(destination));

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Adding...';

    try {
      const r = await fetch('/api/flights', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ origin, destination, departure_date, return_date, target_price: parseInt(target_price), currency })
      });
      if (!r.ok) throw new Error();
      closeSheet();
      showToast('Flight added');
      ['origin','destination','departure_date','return_date','target_price'].forEach(id => document.getElementById(id).value = '');
      await loadFlights();
    } catch (e) {
      showToast('Failed to add');
      updateBackground();
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add Flight';
    }
  });

  // Preview colour while typing destination
  document.getElementById('destination').addEventListener('input', function() {
    const val = this.value.trim().toUpperCase();
    if (val.length === 3) applyPalette(getPalette(val));
    else applyPalette(PALETTES.DEFAULT);
  });

  // ── Push Notifications ──
  const notifBtn = document.getElementById('notif-btn');
  let pushSub = null;

  async function initPush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    try {
      const reg = await navigator.serviceWorker.register('/static/sw.js');
      pushSub = await reg.pushManager.getSubscription();
      notifBtn.classList.toggle('active', !!pushSub);
    } catch (e) {}
  }

  notifBtn.addEventListener('click', async () => {
    if (!('serviceWorker' in navigator)) { showToast('Not supported'); return; }
    try {
      const reg = await navigator.serviceWorker.ready;
      if (pushSub) {
        await fetch('/api/unsubscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ endpoint: pushSub.endpoint }) });
        await pushSub.unsubscribe();
        pushSub = null;
        notifBtn.classList.remove('active');
        showToast('Notifications off');
      } else {
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') { showToast('Permission denied'); return; }
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
        await fetch('/api/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(sub) });
        pushSub = sub;
        notifBtn.classList.add('active');
        showToast('Notifications on');
      }
    } catch (e) { showToast('Error'); }
  });

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
  }

  applyPalette(PALETTES.DEFAULT, false);
  initPush();
  loadFlights();
</script>
</body>
</html>
