<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d5a84" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MFF" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <title>MFF</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --fg: #0d0d0d;
      --dim: rgba(13,13,13,0.42);
      --line: rgba(13,13,13,0.1);
    }

    html, body {
      min-height: 100vh;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── ANIMATED GRADIENT BACKGROUND ── */
    #grad-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #0c5a84;
      transition: background 1.4s ease;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      will-change: transform;
      transition: background 1.4s ease;
    }

    #b1 { width: 140vw; height: 140vw; filter: blur(130px); opacity: 0.9;
          top: -30%; left: -20%; background: #1878b8;
          animation: da 14s ease-in-out infinite; }
    #b2 { width: 120vw; height: 120vw; filter: blur(120px); opacity: 0.85;
          bottom: -20%; right: -20%; background: #0a4a78;
          animation: db 18s ease-in-out infinite; }
    #b3 { width: 90vw;  height: 90vw;  filter: blur(100px); opacity: 0.7;
          top: 20%;  left: 10%; background: #3aaad8;
          animation: dc 11s ease-in-out infinite; }
    #b4 { width: 80vw;  height: 80vw;  filter: blur(110px); opacity: 0.65;
          top: 50%;  right: 5%; background: #4868c0;
          animation: dd 15s ease-in-out infinite; }
    #b5 { width: 70vw;  height: 70vw;  filter: blur(90px);  opacity: 0.55;
          top: 10%;  right: 10%; background: #d0eef8;
          animation: de 9s  ease-in-out infinite; }

    @keyframes da {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(10vw,8vh) scale(1.06); }
      66%      { transform: translate(-6vw,12vh) scale(0.95); }
    }
    @keyframes db {
      0%,100% { transform: translate(0,0) scale(1); }
      40%      { transform: translate(-12vw,-10vh) scale(1.08); }
      70%      { transform: translate(8vw,-5vh) scale(0.94); }
    }
    @keyframes dc {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(-10vw,10vh) scale(1.1); }
    }
    @keyframes dd {
      0%,100% { transform: translate(0,0) scale(1); }
      30%      { transform: translate(-8vw,-8vh) scale(1.05); }
      70%      { transform: translate(6vw,6vh) scale(0.96); }
    }
    @keyframes de {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(8vw,12vh) scale(1.12); }
    }

    /* ── GRAIN OVERLAY ── */
    #grain {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0.38;
      mix-blend-mode: overlay;
      background-size: 180px 180px;
      background-repeat: repeat;
    }

    /* ── PAGE ── */
    .page { position: relative; z-index: 3; }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 18px 10px;
    }

    .nav-logo {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
    }

    .notif-btn {
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 100px;
      color: rgba(255,255,255,0.85);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 6px 14px;
      transition: background 0.2s;
    }
    .notif-btn.active {
      background: rgba(255,255,255,0.38);
      color: #fff;
    }
    .notif-btn:active { opacity: 0.7; }

    /* ── MAIN ── */
    main { padding: 20px 14px 48px; }

    .add-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .page-label {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }

    .add-btn {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: none;
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fg);
      padding: 9px 16px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .add-btn:active { opacity: 0.65; }

    /* ── EMPTY STATE ── */
    .empty-state {
      padding: 70px 0;
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      line-height: 2.8;
    }

    /* ── FLIGHT ITEM ── */
    .flight-item {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s, transform 0.15s;
      color: #fff;
    }
    .flight-item.selected {
      background: rgba(255,255,255,0.3);
      border-color: rgba(255,255,255,0.55);
    }
    .flight-item.alerted {
      background: rgba(230,60,50,0.55);
      border-color: rgba(255,120,100,0.5);
    }
    .flight-item:active { transform: scale(0.985); }

    .flight-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .flight-route {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1;
    }
    .flight-route .arr {
      font-size: 13px;
      font-weight: 400;
      opacity: 0.45;
      margin: 0 3px;
    }
    .flight-price {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-align: right;
    }
    .flight-mid {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .flight-date {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.55;
    }
    .alert-badge {
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.25);
      padding: 3px 8px;
      border-radius: 100px;
    }
    .flight-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.15);
    }
    .flight-target {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.5;
    }
    .flight-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checked-time {
      font-size: 9px;
      opacity: 0.45;
      letter-spacing: 0.05em;
    }
    .btn-sm {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-sm:active { background: rgba(255,255,255,0.28); }

    /* ── BOTTOM SHEET ── */
    .sheet-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .sheet-overlay.open { opacity: 1; pointer-events: all; }

    .sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(220,240,255,0.9);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 22px 22px 0 0;
      border-top: 1px solid rgba(255,255,255,0.7);
      z-index: 101;
      padding: 0 16px calc(env(safe-area-inset-bottom,16px) + 20px);
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
      max-height: 92vh;
      overflow-y: auto;
    }
    .sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 3px;
      background: rgba(0,0,0,0.14);
      border-radius: 2px;
      margin: 12px auto 0;
    }
    .sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0 14px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }
    .sheet-title {
      font-size: 12px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--fg);
    }
    .sheet-close {
      background: rgba(0,0,0,0.07); border: none; border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--dim); padding: 5px 12px; cursor: pointer;
    }

    .field { margin-bottom: 14px; }
    .field-label {
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 6px; display: block;
    }

    /* airport picker trigger */
    .airport-trigger {
      width: 100%;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 10px;
      font-family: 'Space Mono', monospace;
      font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--fg); padding: 11px 12px;
      cursor: pointer; text-align: left;
      transition: background 0.2s;
      display: flex; align-items: center; justify-content: space-between;
    }
    .airport-trigger.placeholder { color: var(--dim); }
    .airport-trigger:active { background: rgba(255,255,255,0.9); }

    .field input[type="date"], .field input[type="number"], .field select {
      width: 100%;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 10px;
      color: var(--fg);
      font-family: 'Space Mono', monospace;
      font-size: 13px; letter-spacing: 0.05em; text-transform: uppercase;
      padding: 11px 12px; outline: none; -webkit-appearance: none;
      transition: background 0.2s;
    }
    .field input::placeholder { color: var(--dim); }
    .field input:focus, .field select:focus { background: rgba(255,255,255,0.95); }
    .field select option { background: #e4f2fa; }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .submit-btn {
      width: 100%; background: #0d0d0d; color: #fff;
      border: none; border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      padding: 16px; cursor: pointer; margin-top: 8px;
      transition: opacity 0.2s;
    }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .submit-btn:active { opacity: 0.8; }

    /* ── AIRPORT SEARCH MODAL ── */
    .airport-modal {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.35);
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    .airport-modal.open { opacity: 1; pointer-events: all; }

    .airport-panel {
      background: rgba(225,242,255,0.95);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 22px 22px 0 0;
      border-top: 1px solid rgba(255,255,255,0.7);
      flex: 1;
      margin-top: auto;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    }
    .airport-modal.open .airport-panel { transform: translateY(0); }

    .airport-panel-handle {
      width: 36px; height: 3px;
      background: rgba(0,0,0,0.14);
      border-radius: 2px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }

    .airport-search-wrap {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      flex-shrink: 0;
    }

    .airport-search-input {
      width: 100%;
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--fg);
      padding: 10px 16px;
      outline: none;
      -webkit-appearance: none;
    }
    .airport-search-input::placeholder { color: var(--dim); }
    .airport-search-input:focus { background: rgba(255,255,255,0.95); }

    .airport-results {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0 calc(env(safe-area-inset-bottom,0px) + 16px);
    }

    .airport-item {
      display: flex; align-items: center;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.15s;
      gap: 12px;
    }
    .airport-item:active { background: rgba(255,255,255,0.5); }

    .airport-code {
      font-family: 'Space Mono', monospace;
      font-size: 14px; font-weight: 700;
      letter-spacing: 0.08em; color: var(--fg);
      flex-shrink: 0; width: 38px;
    }
    .airport-info { flex: 1; min-width: 0; }
    .airport-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; color: var(--fg);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .airport-country {
      font-family: 'Space Mono', monospace;
      font-size: 9px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--dim);
      margin-top: 1px;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom,0px) + 24px);
      left: 50%; transform: translateX(-50%) translateY(14px);
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(12px);
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 9px 18px; border-radius: 100px;
      white-space: nowrap; opacity: 0; pointer-events: none;
      transition: all 0.22s; z-index: 300;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Gradient background -->
<div id="grad-bg">
  <div class="blob" id="b1"></div>
  <div class="blob" id="b2"></div>
  <div class="blob" id="b3"></div>
  <div class="blob" id="b4"></div>
  <div class="blob" id="b5"></div>
</div>

<!-- Grain overlay (canvas-based, injected by JS) -->
<div id="grain"></div>

<div class="page">
  <nav>
    <!-- Circular text logo -->
    <svg class="nav-logo" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <path id="cp" d="M40,40 m-29,0 a29,29 0 1,1 58,0 a29,29 0 1,1 -58,0"/>
      </defs>
      <text font-size="8.8" font-family="'Space Mono',monospace" font-weight="700"
            fill="rgba(255,255,255,0.92)" letter-spacing="2.2">
        <textPath href="#cp" startOffset="0%">MY✦FAV✦FLIGHT✦MY✦FAV</textPath>
      </text>
    </svg>
    <button class="notif-btn" id="notif-btn">Notify</button>
  </nav>

  <main>
    <div class="add-row">
      <span class="page-label">Price Tracker</span>
      <button class="add-btn" id="open-sheet-btn">+ Track Flight</button>
    </div>
    <div id="flight-list">
      <div class="empty-state">No flights tracked.<br>Add one above.</div>
    </div>
  </main>
</div>

<!-- Add flight sheet -->
<div class="sheet-overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">Track Flight</span>
    <button class="sheet-close" id="close-sheet-btn">Close</button>
  </div>
  <div class="field-row">
    <div class="field">
      <label class="field-label">出發地</label>
      <button class="airport-trigger placeholder" id="origin-trigger" data-target="origin">選擇機場</button>
      <input type="hidden" id="origin" />
    </div>
    <div class="field">
      <label class="field-label">目的地</label>
      <button class="airport-trigger placeholder" id="destination-trigger" data-target="destination">選擇機場</button>
      <input type="hidden" id="destination" />
    </div>
  </div>
  <div class="field-row">
    <div class="field">
      <label class="field-label">去程日期</label>
      <input type="date" id="departure_date" />
    </div>
    <div class="field">
      <label class="field-label">回程日期</label>
      <input type="date" id="return_date" />
    </div>
  </div>
  <div class="field-row">
    <div class="field">
      <label class="field-label">目標價格</label>
      <input type="number" id="target_price" placeholder="8000" />
    </div>
    <div class="field">
      <label class="field-label">幣別</label>
      <select id="currency">
        <option value="TWD">TWD</option>
        <option value="USD">USD</option>
        <option value="JPY">JPY</option>
        <option value="EUR">EUR</option>
        <option value="KRW">KRW</option>
        <option value="HKD">HKD</option>
        <option value="SGD">SGD</option>
        <option value="AUD">AUD</option>
        <option value="GBP">GBP</option>
        <option value="THB">THB</option>
      </select>
    </div>
  </div>
  <button class="submit-btn" id="submit-btn">新增航班</button>
</div>

<!-- Airport search modal -->
<div class="airport-modal" id="airport-modal">
  <div style="flex:1" id="modal-backdrop"></div>
  <div class="airport-panel">
    <div class="airport-panel-handle"></div>
    <div class="airport-search-wrap">
      <input class="airport-search-input" id="airport-search" placeholder="搜尋機場名稱或代碼..." autocomplete="off" />
    </div>
    <div class="airport-results" id="airport-results"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const VAPID_PUBLIC_KEY = "{{ vapid_public_key }}";

  // ── Airport data ──
  const AIRPORTS = [
    // 台灣
    {code:'TPE',name:'台灣桃園國際機場',country:'台灣'},
    {code:'TSA',name:'台北松山機場',country:'台灣'},
    {code:'KHH',name:'高雄國際機場',country:'台灣'},
    {code:'RMQ',name:'台中國際機場',country:'台灣'},
    {code:'TNN',name:'台南機場',country:'台灣'},
    {code:'TTT',name:'台東機場',country:'台灣'},
    {code:'HUN',name:'花蓮機場',country:'台灣'},
    {code:'MZG',name:'澎湖馬公機場',country:'台灣'},
    // 日本
    {code:'NRT',name:'東京成田國際機場',country:'日本'},
    {code:'HND',name:'東京羽田機場',country:'日本'},
    {code:'KIX',name:'大阪關西國際機場',country:'日本'},
    {code:'ITM',name:'大阪伊丹機場',country:'日本'},
    {code:'NGO',name:'名古屋中部國際機場',country:'日本'},
    {code:'CTS',name:'札幌新千歲機場',country:'日本'},
    {code:'FUK',name:'福岡機場',country:'日本'},
    {code:'OKA',name:'沖繩那霸機場',country:'日本'},
    {code:'SDJ',name:'仙台機場',country:'日本'},
    {code:'HIJ',name:'廣島機場',country:'日本'},
    {code:'UKB',name:'神戶機場',country:'日本'},
    {code:'KOJ',name:'鹿兒島機場',country:'日本'},
    {code:'KMJ',name:'熊本機場',country:'日本'},
    {code:'OIT',name:'大分機場',country:'日本'},
    {code:'KMI',name:'宮崎機場',country:'日本'},
    {code:'MYJ',name:'松山機場',country:'日本'},
    {code:'TAK',name:'高松機場',country:'日本'},
    {code:'TKS',name:'德島機場',country:'日本'},
    {code:'KCZ',name:'高知機場',country:'日本'},
    {code:'AOJ',name:'青森機場',country:'日本'},
    {code:'HKD',name:'函館機場',country:'日本'},
    {code:'AKJ',name:'旭川機場',country:'日本'},
    {code:'ISG',name:'石垣島新石垣機場',country:'日本'},

    MIA:['#0a1e50','#163880','#3a80c0','#80b8da','#dce8ff','#081840'],
    BOS:['#081038','#143278','#3676b6','#7ab0d6','#dce8ff','#060e30'],
    SEA:['#081038','#143278','#3676b6','#7ab0d6','#dce8ff','#060e30'],
    YVR:['#0a1e50','#163880','#3a80c0','#80b8da','#dce8ff','#081840'],
    YYZ:['#081038','#143278','#3676b6','#7ab0d6','#dce8ff','#060e30'],
    HNL:['#083a68','#1480c0','#6ac0e8','#b0daf8','#f0fbff','#062e58'],
    // Oceania — clear sky + bright white
    SYD:['#083260','#1478b8','#64b8e8','#acd4f4','#eefaff','#062858'],
    MEL:['#072e58','#1270b0','#60b0e4','#a8cef0','#eef8ff','#062450'],
    BNE:['#083a68','#1480c0','#6ac0e8','#b0daf8','#f0fbff','#062e58'],
    PER:['#083260','#1478b8','#64b8e8','#acd4f4','#eefaff','#062858'],
    AKL:['#083a68','#1480c0','#6ac0e8','#b0daf8','#f0fbff','#062e58'],
    // Default — deep blue + light blue + white 三層流動
    DEFAULT:['#0a3a6e','#1878b8','#5ab0e0','#90cef0','#e8f6ff','#083060'],
    // Alert — deep red (price target hit)
    ALERT:['#c82020','#901010','#e04040','#c03030','#f8d0d0','#780808'],
  };

  function getPalette(iata) {
    return PALETTES[(iata||'').toUpperCase()] || PALETTES.DEFAULT;
  }

  function applyPalette(p, animate = true) {
    const dur = animate ? '' : '0s';
    const bg = document.getElementById('grad-bg');
    ['b1','b2','b3','b4','b5'].forEach((id,i) => {
      const el = document.getElementById(id);
      if (!animate) el.style.transition = 'none';
      el.style.background = p[i];
      if (!animate) setTimeout(() => el.style.transition = '', 30);
    });
    if (!animate) bg.style.transition = 'none';
    bg.style.background = p[5];
    if (!animate) setTimeout(() => bg.style.transition = '', 30);
  }

  // ── Static canvas grain (generated once, no flicker) ──
  const grainEl = document.getElementById('grain');
  (function() {
    const size = 256;
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx = c.getContext('2d');
    const img = ctx.createImageData(size, size);
    for (let i = 0; i < img.data.length; i += 4) {
      const v = Math.random() * 255 | 0;
      img.data[i] = v; img.data[i+1] = v; img.data[i+2] = v; img.data[i+3] = 255;
    }
    ctx.putImageData(img, 0, 0);
    grainEl.style.backgroundImage = `url(${c.toDataURL('image/png')})`;
  })();

  // ── Sheet ──
  const overlay = document.getElementById('overlay');
  const sheet   = document.getElementById('sheet');
  function openSheet()  { sheet.classList.add('open'); overlay.classList.add('open'); document.body.style.overflow='hidden'; }
  function closeSheet() { sheet.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow=''; }
  document.getElementById('open-sheet-btn').addEventListener('click', openSheet);
  document.getElementById('close-sheet-btn').addEventListener('click', closeSheet);
  overlay.addEventListener('click', closeSheet);

  // ── Airport modal ──
  const airportModal = document.getElementById('airport-modal');
  let activeAirportTarget = null;

  function openAirportModal(target) {
    activeAirportTarget = target;
    document.getElementById('airport-search').value = '';
    renderAirportResults('');
    airportModal.classList.add('open');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('airport-search').focus(), 300);
  }

  function closeAirportModal() {
    airportModal.classList.remove('open');
    document.body.style.overflow = '';
    activeAirportTarget = null;
  }

  document.getElementById('modal-backdrop').addEventListener('click', closeAirportModal);

  document.getElementById('origin-trigger').addEventListener('click', () => openAirportModal('origin'));
  document.getElementById('destination-trigger').addEventListener('click', () => openAirportModal('destination'));

  function renderAirportResults(q) {
    const lower = q.toLowerCase();
    const filtered = q.length < 1
      ? AIRPORTS
      : AIRPORTS.filter(a =>
          a.code.toLowerCase().includes(lower) ||
          a.name.toLowerCase().includes(lower) ||
          a.country.toLowerCase().includes(lower)
        );

    const results = document.getElementById('airport-results');
    results.innerHTML = filtered.slice(0, 80).map(a => `
      <div class="airport-item" onclick="selectAirport('${a.code}','${a.name.replace(/'/g,"\\'")}')">
        <div class="airport-code">${a.code}</div>
        <div class="airport-info">
          <div class="airport-name">${a.name}</div>
          <div class="airport-country">${a.country}</div>
        </div>
      </div>`).join('');
  }

  document.getElementById('airport-search').addEventListener('input', function() {
    renderAirportResults(this.value);
  });

  function selectAirport(code, name) {
    if (!activeAirportTarget) return;
    document.getElementById(activeAirportTarget).value = code;
    const trigger = document.getElementById(activeAirportTarget + '-trigger');
    trigger.textContent = code + ' · ' + name;
    trigger.classList.remove('placeholder');
    closeAirportModal();
    // preview background
    if (activeAirportTarget === 'destination') applyPalette(getPalette(code));
  }

  // ── Toast ──
  function showToast(msg, d=2500) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), d);
  }

  function fmtPrice(p, cur) { return p == null ? '—' : p.toLocaleString() + ' ' + cur; }

  function timeSince(str) {
    if (!str) return 'Not checked';
    const h = Math.floor((Date.now() - new Date(str+'Z').getTime()) / 3600000);
    if (h < 1) return 'Just now';
    if (h < 24) return h + 'h ago';
    return Math.floor(h/24) + 'd ago';
  }

  let allFlights = [];
  let selectedId = null;

  function updateBg() {
    if (allFlights.some(f => f.current_price && f.current_price <= f.target_price)) {
      applyPalette(PALETTES.ALERT); return;
    }
    if (selectedId) {
      const f = allFlights.find(x => x.id === selectedId);
      if (f) { applyPalette(getPalette(f.destination)); return; }
    }
    if (allFlights.length) applyPalette(getPalette(allFlights[0].destination));
    else applyPalette(PALETTES.DEFAULT);
  }

  function renderFlights(flights) {
    allFlights = flights;
    const list = document.getElementById('flight-list');
    if (!flights.length) {
      list.innerHTML = '<div class="empty-state">No flights tracked.<br>Add one above.</div>';
      updateBg(); return;
    }
    list.innerHTML = flights.map(f => {
      const alerted  = f.current_price && f.current_price <= f.target_price;
      const selected = f.id === selectedId;
      let cls = 'flight-item' + (alerted ? ' alerted' : '') + (selected ? ' selected' : '');
      const tripLabel = f.return_date ? 'RT' : 'OW';
      return `<div class="${cls}" data-id="${f.id}" onclick="selectFlight(${f.id})">
        <div class="flight-top">
          <div class="flight-route">${f.origin}<span class="arr"> → </span>${f.destination}</div>
          <div class="flight-price">${fmtPrice(f.current_price, f.currency)}</div>
        </div>
        <div class="flight-mid">
          <div class="flight-date">${f.departure_date}${f.return_date?' · '+f.return_date:''} · ${tripLabel}</div>
          ${alerted ? '<span class="alert-badge">↓ Below Target</span>' : ''}
        </div>
        <div class="flight-bottom">
          <div class="flight-target">Target: ${fmtPrice(f.target_price, f.currency)}</div>
          <div class="flight-actions">
            <span class="checked-time">${timeSince(f.last_checked)}</span>
            <button class="btn-sm" onclick="event.stopPropagation();checkFlight(${f.id})">Check</button>
            <button class="btn-sm" onclick="event.stopPropagation();deleteFlight(${f.id})">Del</button>
          </div>
        </div>
      </div>`;
    }).join('');
    updateBg();
  }

  function selectFlight(id) {
    selectedId = selectedId === id ? null : id;
    renderFlights(allFlights);
  }

  async function loadFlights() {
    try { renderFlights(await (await fetch('/api/flights')).json()); }
    catch(e) { showToast('Load failed'); }
  }

  async function checkFlight(id) {
    try {
      if (!(await fetch(`/api/flights/${id}/check`, {method:'POST'})).ok) throw 0;
      showToast('Updated');
    } catch(e) { showToast('Check failed'); }
    await loadFlights();
  }

  async function deleteFlight(id) {
    if (selectedId === id) selectedId = null;
    try { await fetch(`/api/flights/${id}`, {method:'DELETE'}); await loadFlights(); }
    catch(e) { showToast('Delete failed'); }
  }

  document.getElementById('submit-btn').addEventListener('click', async () => {
    const origin       = document.getElementById('origin').value;
    const destination  = document.getElementById('destination').value;
    const dep          = document.getElementById('departure_date').value;
    const ret          = document.getElementById('return_date').value;
    const target       = document.getElementById('target_price').value;
    const currency     = document.getElementById('currency').value;

    if (!origin || !destination || !dep || !target) { showToast('請填寫所有必填欄位'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = '新增中...';

    try {
      const r = await fetch('/api/flights', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({origin, destination, departure_date:dep, return_date:ret, target_price:parseInt(target), currency})
      });
      if (!r.ok) throw 0;
      closeSheet();
      showToast('航班已新增');
      ['origin','destination','departure_date','return_date','target_price'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('origin-trigger').textContent = '選擇機場';
      document.getElementById('origin-trigger').classList.add('placeholder');
      document.getElementById('destination-trigger').textContent = '選擇機場';
      document.getElementById('destination-trigger').classList.add('placeholder');
      await loadFlights();
    } catch(e) { showToast('新增失敗'); updateBg(); }
    finally { btn.disabled = false; btn.textContent = '新增航班'; }
  });

  // ── Push notifications ──
  const notifBtn = document.getElementById('notif-btn');
  let pushSub = null;

  async function initPush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    try {
      const reg = await navigator.serviceWorker.register('/static/sw.js');
      pushSub = await reg.pushManager.getSubscription();
      notifBtn.classList.toggle('active', !!pushSub);
    } catch(e) {}
  }

  notifBtn.addEventListener('click', async () => {
    if (!('serviceWorker' in navigator)) { showToast('Not supported'); return; }
    try {
      const reg = await navigator.serviceWorker.ready;
      if (pushSub) {
        await fetch('/api/unsubscribe', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({endpoint: pushSub.endpoint})});
        await pushSub.unsubscribe();
        pushSub = null; notifBtn.classList.remove('active'); showToast('通知已關閉');
      } else {
        if (await Notification.requestPermission() !== 'granted') { showToast('權限被拒絕'); return; }
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlB64(VAPID_PUBLIC_KEY)
        });
        await fetch('/api/subscribe', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(sub)});
        pushSub = sub; notifBtn.classList.add('active'); showToast('通知已開啟');
      }
    } catch(e) { showToast('Error'); }
  });

  function urlB64(s) {
    const p = '='.repeat((4 - s.length%4)%4);
    const b = (s+p).replace(/-/g,'+').replace(/_/g,'/');
    return Uint8Array.from([...atob(b)].map(c=>c.charCodeAt(0)));
  }

  applyPalette(PALETTES.DEFAULT, false);
  initPush();
  loadFlights();
</script>
</body>
</html>
