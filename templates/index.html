<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="MFF" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <title>MFF</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --fg: #fbfbfb;
      --dim: rgba(251,251,251,0.35);
      --line: rgba(251,251,251,0.1);
      --alert: #EF4444;
    }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Sans', -apple-system, sans-serif;
      font-size: 13px;
      letter-spacing: 0.04em;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg);
    }

    .nav-logo {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.12em;
      color: var(--fg);
      text-transform: uppercase;
    }

    .nav-logo span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--fg);
      border-radius: 50%;
      margin-left: 6px;
      vertical-align: middle;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .notif-btn {
      background: none;
      border: none;
      color: var(--dim);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }

    .notif-btn.active { color: var(--fg); }
    .notif-btn:hover { color: var(--fg); }

    /* ── HEADER ── */
    header {
      padding: 40px 16px 32px;
      border-bottom: 1px solid var(--line);
    }

    .header-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 10px;
    }

    .header-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: -0.01em;
      line-height: 1.1;
      text-transform: uppercase;
      color: var(--fg);
    }

    .header-title em {
      font-style: normal;
      color: var(--dim);
    }

    /* ── ADD BUTTON ── */
    .add-bar {
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
    }

    .add-btn {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 16px 0;
      background: none;
      border: none;
      color: var(--dim);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      gap: 10px;
      transition: color 0.2s;
    }

    .add-btn:hover, .add-btn:active { color: var(--fg); }

    .add-btn-icon {
      width: 20px;
      height: 20px;
      border: 1px solid currentColor;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
    }

    /* ── FLIGHT LIST ── */
    #flight-list { }

    .empty-state {
      padding: 60px 16px;
      text-align: center;
      color: var(--dim);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      line-height: 2;
    }

    /* ── FLIGHT ITEM ── */
    .flight-item {
      padding: 20px 16px;
      border-bottom: 1px solid var(--line);
      position: relative;
    }

    .flight-item.alerted {
      background: var(--alert);
    }

    .flight-row-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .flight-route {
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1;
    }

    .flight-item.alerted .flight-route { color: #000; }

    .flight-arrow {
      color: var(--dim);
      margin: 0 6px;
      font-size: 14px;
    }

    .flight-item.alerted .flight-arrow { color: rgba(0,0,0,0.4); }

    .flight-price-current {
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .flight-item.alerted .flight-price-current { color: #000; }

    .flight-row-mid {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .flight-meta {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .flight-item.alerted .flight-meta { color: rgba(0,0,0,0.5); }

    .flight-target-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .flight-target-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .flight-item.alerted .flight-target-label { color: rgba(0,0,0,0.5); }

    .flight-target-value {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--dim);
    }

    .flight-item.alerted .flight-target-value { color: rgba(0,0,0,0.6); }

    .flight-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-check, .btn-delete {
      background: none;
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
      transition: opacity 0.2s;
    }

    .btn-check { color: var(--dim); }
    .btn-delete { color: var(--dim); }
    .flight-item.alerted .btn-check,
    .flight-item.alerted .btn-delete { color: rgba(0,0,0,0.5); }
    .btn-check:hover, .btn-delete:hover { opacity: 1; color: var(--fg); }
    .flight-item.alerted .btn-check:hover,
    .flight-item.alerted .btn-delete:hover { color: #000; opacity: 0.8; }

    .alert-badge {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: #000;
      color: var(--alert);
      padding: 2px 6px;
      border-radius: 2px;
    }

    /* ── BOTTOM SHEET ── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .sheet-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111;
      border-top: 1px solid var(--line);
      z-index: 101;
      padding: 0 16px calc(env(safe-area-inset-bottom, 16px) + 16px);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 92vh;
      overflow-y: auto;
    }

    .sheet.open {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 3px;
      background: var(--line);
      border-radius: 2px;
      margin: 12px auto 0;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 24px;
    }

    .sheet-title {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--fg);
    }

    .sheet-close {
      background: none;
      border: none;
      color: var(--dim);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 0;
    }

    .field {
      margin-bottom: 20px;
    }

    .field-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 8px;
      display: block;
    }

    .field input, .field select {
      width: 100%;
      background: none;
      border: none;
      border-bottom: 1px solid var(--line);
      color: var(--fg);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 10px 0;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      border-radius: 0;
    }

    .field input::placeholder { color: var(--dim); text-transform: uppercase; }
    .field input:focus, .field select:focus { border-color: var(--fg); }

    .field select option { background: #111; }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .submit-btn {
      width: 100%;
      background: var(--fg);
      color: var(--bg);
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 16px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--fg);
      color: var(--bg);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 18px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s;
      z-index: 200;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .loading-bar {
      height: 1px;
      background: var(--line);
      position: relative;
      overflow: hidden;
    }

    .loading-bar::after {
      content: '';
      position: absolute;
      left: -100%;
      top: 0;
      width: 100%;
      height: 100%;
      background: var(--fg);
      animation: load 1.2s ease infinite;
    }

    @keyframes load {
      to { left: 100%; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">MFF<span></span></div>
  <div class="nav-actions">
    <button class="notif-btn" id="notif-btn">[ Notify ]</button>
  </div>
</nav>

<header>
  <div class="header-label">Price Tracker</div>
  <div class="header-title">My <em>Favorite</em><br>Flight</div>
</header>

<div class="add-bar">
  <button class="add-btn" id="open-sheet-btn">
    <span class="add-btn-icon">+</span>
    Track New Flight
  </button>
</div>

<div id="flight-list">
  <div class="empty-state">No flights tracked.<br>Add one above.</div>
</div>

<!-- Bottom Sheet -->
<div class="sheet-overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title">Track Flight</span>
    <button class="sheet-close" id="close-sheet-btn">[ Close ]</button>
  </div>

  <div class="field-row">
    <div class="field">
      <label class="field-label">From</label>
      <input type="text" id="origin" placeholder="TPE" maxlength="3" />
    </div>
    <div class="field">
      <label class="field-label">To</label>
      <input type="text" id="destination" placeholder="NRT" maxlength="3" />
    </div>
  </div>

  <div class="field-row">
    <div class="field">
      <label class="field-label">Depart</label>
      <input type="date" id="departure_date" />
    </div>
    <div class="field">
      <label class="field-label">Return</label>
      <input type="date" id="return_date" />
    </div>
  </div>

  <div class="field-row">
    <div class="field">
      <label class="field-label">Target Price</label>
      <input type="number" id="target_price" placeholder="8000" />
    </div>
    <div class="field">
      <label class="field-label">Currency</label>
      <select id="currency">
        <option value="TWD">TWD</option>
        <option value="USD">USD</option>
        <option value="JPY">JPY</option>
        <option value="EUR">EUR</option>
        <option value="KRW">KRW</option>
      </select>
    </div>
  </div>

  <button class="submit-btn" id="submit-btn">Add Flight</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const VAPID_PUBLIC_KEY = "{{ vapid_public_key }}";

  // ── Sheet ──
  const overlay = document.getElementById('overlay');
  const sheet = document.getElementById('sheet');
  const openBtn = document.getElementById('open-sheet-btn');
  const closeBtn = document.getElementById('close-sheet-btn');

  function openSheet() {
    sheet.classList.add('open');
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeSheet() {
    sheet.classList.remove('open');
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  openBtn.addEventListener('click', openSheet);
  closeBtn.addEventListener('click', closeSheet);
  overlay.addEventListener('click', closeSheet);

  // ── Toast ──
  function showToast(msg, duration = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  // ── Format helpers ──
  function fmtPrice(price, currency) {
    if (price == null) return '—';
    return price.toLocaleString() + ' ' + currency;
  }

  function fmtDate(str) {
    if (!str) return '';
    return str;
  }

  function timeSince(str) {
    if (!str) return 'Never checked';
    const diff = Date.now() - new Date(str + 'Z').getTime();
    const h = Math.floor(diff / 3600000);
    if (h < 1) return 'Just now';
    if (h < 24) return h + 'h ago';
    return Math.floor(h / 24) + 'd ago';
  }

  // ── Render flights ──
  function renderFlights(flights) {
    const list = document.getElementById('flight-list');
    if (!flights.length) {
      list.innerHTML = '<div class="empty-state">No flights tracked.<br>Add one above.</div>';
      return;
    }

    list.innerHTML = flights.map(f => {
      const alerted = f.current_price && f.current_price <= f.target_price;
      const cls = alerted ? 'flight-item alerted' : 'flight-item';
      const currentDisplay = f.current_price ? fmtPrice(f.current_price, f.currency) : '—';
      const tripType = f.return_date ? 'Round Trip' : 'One Way';
      return `
        <div class="${cls}" data-id="${f.id}">
          <div class="flight-row-top">
            <div class="flight-route">
              ${f.origin}<span class="flight-arrow">→</span>${f.destination}
            </div>
            <div class="flight-price-current">${currentDisplay}</div>
          </div>
          <div class="flight-row-mid">
            <div class="flight-meta">${fmtDate(f.departure_date)}${f.return_date ? ' · ' + fmtDate(f.return_date) : ''} · ${tripType}</div>
            ${alerted ? '<span class="alert-badge">↓ Below Target</span>' : ''}
          </div>
          <div class="flight-target-row">
            <div class="flight-target-label">Target: <span class="flight-target-value">${fmtPrice(f.target_price, f.currency)}</span></div>
            <div class="flight-actions">
              <span class="flight-meta" style="margin-right:4px">${timeSince(f.last_checked)}</span>
              <button class="btn-check" onclick="checkFlight(${f.id})">[ Check ]</button>
              <button class="btn-delete" onclick="deleteFlight(${f.id})">[ Del ]</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  // ── API calls ──
  async function loadFlights() {
    try {
      const r = await fetch('/api/flights');
      const data = await r.json();
      renderFlights(data);
    } catch (e) {
      showToast('Load failed');
    }
  }

  async function checkFlight(id) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) {
      const orig = el.innerHTML;
      el.innerHTML = '<div class="loading-bar"></div>';
      el.style.padding = '0';
    }
    try {
      const r = await fetch(`/api/flights/${id}/check`, { method: 'POST' });
      if (!r.ok) throw new Error();
      showToast('Updated');
    } catch (e) {
      showToast('Check failed');
    }
    await loadFlights();
  }

  async function deleteFlight(id) {
    try {
      await fetch(`/api/flights/${id}`, { method: 'DELETE' });
      await loadFlights();
    } catch (e) {
      showToast('Delete failed');
    }
  }

  // ── Submit ──
  document.getElementById('submit-btn').addEventListener('click', async () => {
    const origin = document.getElementById('origin').value.trim().toUpperCase();
    const destination = document.getElementById('destination').value.trim().toUpperCase();
    const departure_date = document.getElementById('departure_date').value;
    const return_date = document.getElementById('return_date').value;
    const target_price = document.getElementById('target_price').value;
    const currency = document.getElementById('currency').value;

    if (!origin || !destination || !departure_date || !target_price) {
      showToast('Fill all required fields');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Adding...';

    try {
      const r = await fetch('/api/flights', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ origin, destination, departure_date, return_date, target_price: parseInt(target_price), currency })
      });
      if (!r.ok) throw new Error();
      closeSheet();
      showToast('Flight added');
      document.getElementById('origin').value = '';
      document.getElementById('destination').value = '';
      document.getElementById('departure_date').value = '';
      document.getElementById('return_date').value = '';
      document.getElementById('target_price').value = '';
      await loadFlights();
    } catch (e) {
      showToast('Failed to add flight');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add Flight';
    }
  });

  // ── Push notifications ──
  const notifBtn = document.getElementById('notif-btn');
  let pushSub = null;

  async function initPush() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
    try {
      const reg = await navigator.serviceWorker.register('/static/sw.js');
      pushSub = await reg.pushManager.getSubscription();
      notifBtn.classList.toggle('active', !!pushSub);
    } catch (e) {}
  }

  notifBtn.addEventListener('click', async () => {
    if (!('serviceWorker' in navigator)) { showToast('Not supported'); return; }
    try {
      const reg = await navigator.serviceWorker.ready;
      if (pushSub) {
        await fetch('/api/unsubscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ endpoint: pushSub.endpoint }) });
        await pushSub.unsubscribe();
        pushSub = null;
        notifBtn.classList.remove('active');
        showToast('Notifications off');
      } else {
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') { showToast('Permission denied'); return; }
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
        await fetch('/api/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(sub) });
        pushSub = sub;
        notifBtn.classList.add('active');
        showToast('Notifications on');
      }
    } catch (e) { showToast('Error'); }
  });

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
  }

  initPush();
  loadFlights();
</script>
</body>
</html>
